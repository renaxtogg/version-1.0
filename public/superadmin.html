// ── Utils ────────────────────────────────────────────────────
const daysUntil = d => {
  if (!d) return null;
  const diff = new Date(d) - new Date();
  return Math.ceil(diff / 86400000);
};
const fmtDate = d => d ? new Date(d).toLocaleDateString('es-PY',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const fmtDateTime = d => d ? new Date(d).toLocaleString('es-PY',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
const fmtGuarani = n => n ? `₲ ${Number(n).toLocaleString('es-PY')}` : '₲ 0';
const fmtUSD = n => `$${Number(n).toFixed(2)}`;
const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;

  if (days === null) return {label:'—', color:C.mid, bg:'#1a1a1a'};
  if (days < 0)  return {label:'Vencido', color:C.red, bg:'#2a1010'};
  if (days === 0) return {label:'Vence hoy', color:C.red, bg:'#2a1010'};
  if (days <= 6) return {label:`${days}d`, color:C.red, bg:'#2a1010'};
  if (days <= 30) return {label:`${days}d`, color:C.yellow, bg:'#2a2010'};
  return {label:`${days}d`, color:C.green, bg:'#102a10'};
};

// ── Analytics helpers ────────────────────────────────────────
function buildAnalytics(restaurants, orders, ratings, subscriptions, plans) {
  const now = new Date();
  const ago30 = new Date(now - 30*86400000).toISOString();
  const todayStr = now.toISOString().slice(0,10);

  return restaurants.map(r => {
    const rOrders = orders.filter(o => o.restaurant_id === r.id);
    const recent  = rOrders.filter(o => o.created_at >= ago30);
    const todayOrders = rOrders.filter(o => (o.created_at||'').slice(0,10) === todayStr);
    const revenue30   = recent.reduce((s,o)=>s+(Number(o.total)||0),0);
    const rRatings    = ratings.filter(x=>x.restaurant_id===r.id).map(x=>x.stars);
    const rSub        = subscriptions.find(s=>s.restaurant_id===r.id);
    const plan        = rSub?.plan || (rSub ? plans.find(p=>p.id===rSub.plan_id) : null);
    const days        = rSub ? daysUntil(rSub.end_date) : null;
    return {
      ...r,
      orders30:  recent.length,
      ordersToday: todayOrders.length,
      revenue30,
      avgRating: rRatings.length ? +(avg(rRatings).toFixed(1)) : null,
      subscription: rSub,
      plan,
      daysLeft: days,
    };
  });
}

    const {error} = await db.from('restaurants').update({status:next}).eq('id',r.id);
    if (error) { setFlash({type:'error',text:'Error: '+error.message}); return; }
    await db.from('platform_events').insert({restaurant_id:r.id,event_type:'status_changed',description:`Estado cambiado a ${next}`});
    setFlash({type:'ok',text:`${r.name} → ${next}`});
    reload();
  };

  const saveRestaurant = async () => {
    if (!form.name.trim()) { setFlash({type:'error',text:'El nombre es requerido'}); return; }
    setSaving(true);
    try {
      if (!db) { setFlash({type:'warn',text:'Sin conexión — operación demo'}); setSaving(false); return; }
      if (modal==='create') {
        const {data:rest,error} = await db.from('restaurants')
          .insert({name:form.name,city:form.city,country:form.country,owner_name:form.owner_name,owner_email:form.owner_email,owner_phone:form.owner_phone,status:form.status,notes:form.notes||null,onboarding_date:form.onboarding_date,timezone:'America/Asuncion'})
          .select().single();
        if (error) throw error;
        if (form.plan_id) {
          const today = new Date();
          const end = new Date(today); end.setMonth(end.getMonth()+1);
          await db.from('subscriptions').insert({restaurant_id:rest.id,plan_id:form.plan_id,status:form.status==='trial'?'trial':'active',start_date:today.toISOString().slice(0,10),end_date:end.toISOString().slice(0,10)});
        }
        await db.from('platform_events').insert({restaurant_id:rest.id,event_type:'onboarding',description:`Alta en plataforma — ${form.status}`});
        setFlash({type:'ok',text:`${form.name} dado de alta correctamente`});
      } else {
        const {error} = await db.from('restaurants').update({name:form.name,city:form.city,country:form.country,owner_name:form.owner_name,owner_email:form.owner_email,owner_phone:form.owner_phone,status:form.status,notes:form.notes||null,onboarding_date:form.onboarding_date}).eq('id',modal.edit.id);
        if (error) throw error;
        setFlash({type:'ok',text:`${form.name} actualizado`});
      }
      setModal(null); reload();
    } catch(e) { setFlash({type:'error',text:'Error: '+e.message}); }
    setSaving(false);
  };

  const filterBtn = (v,label) => (
    <button onClick={()=>setFilter(v)} style={{padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:600,border:`1px solid ${filter===v?C.blue:C.border}`,background:filter===v?C.blueDim:'transparent',color:filter===v?C.blue:C.mid,cursor:'pointer'}}>
      {label}
    </button>
  );

  return (
    <div className="animate-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {filterBtn('all','Todos')} {filterBtn('active','Activos')} {filterBtn('trial','Trial')} {filterBtn('suspended','Suspendidos')}
        </div>
        <Btn onClick={()=>{setForm({name:'',city:'',country:'Paraguay',owner_name:'',owner_email:'',owner_phone:'',status:'active',notes:'',plan_id:plans[1]?.id||'',onboarding_date:new Date().toISOString().slice(0,10)});setModal('create')}}>+ Nuevo ecosistema</Btn>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead style={{background:C.surface}}>
            <tr><Th>Restaurante</Th><Th>Propietario</Th><Th>Plan</Th><Th>Estado</Th><Th>Vence</Th><Th>Pedidos 30d</Th><Th>Rating</Th><Th>Alta</Th><Th>Acciones</Th></tr>
          </thead>
          <tbody>
            {shown.length===0&&<tr><Td colSpan={9} style={{textAlign:'center',color:C.dim,padding:40}}>Sin resultados</Td></tr>}
            {shown.map(r=>{
              const db2 = daysBadge(r.daysLeft);
              return (
                <tr key={r.id} style={{transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background=C.surface} onMouseLeave={e=>e.currentTarget.style.background=''}>
                  <Td>
                    <div style={{fontWeight:600,color:C.ink}}>{r.name}</div>
                    <div style={{fontSize:11,color:C.mid}}>{r.city}, {r.country}</div>
                  </Td>
                  <Td>
                    <div style={{fontSize:13}}>{r.owner_name||'—'}</div>
                    <div style={{fontSize:11,color:C.mid}}>{r.owner_email||''}</div>
                  </Td>
                  <Td><PlanBadge name={r.plan?.name}/></Td>
                  <Td><Badge status={r.status}/></Td>
                  <Td><span style={{color:db2.color,fontWeight:600,fontSize:12,background:db2.bg,padding:'2px 8px',borderRadius:12}}>{db2.label}</span></Td>
                  <Td style={{fontWeight:600}}>{r.orders30}</Td>
                  <Td>{r.avgRating?<span style={{color:C.yellow}}>★ {r.avgRating}</span>:<span style={{color:C.dim}}>—</span>}</Td>
                  <Td style={{fontSize:11,color:C.mid}}>{fmtDate(r.onboarding_date)}</Td>
                  <Td>
                    <div style={{display:'flex',gap:6}}>
                      <Btn size="sm" variant="ghost" onClick={()=>openEdit(r)}>Editar</Btn>
                      <Btn size="sm" variant={r.status==='active'?'danger':'success'} onClick={()=>toggleStatus(r)}>
                        {r.status==='active'?'Suspender':'Activar'}
                      </Btn>
                    </div>
                  </Td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {modal&&(
        <Modal title={modal==='create'?'Nuevo ecosistema gastronómico':'Editar restaurante'} onClose={()=>setModal(null)}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>
            <FormField label="Nombre del local *"><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ej: La Huaca"/></FormField>
            <FormField label="Ciudad"><input value={form.city} onChange={e=>setForm({...form,city:e.target.value})} placeholder="Asunción"/></FormField>
            <FormField label="País"><input value={form.country} onChange={e=>setForm({...form,country:e.target.value})}/></FormField>
            <FormField label="Estado">
              <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                <option value="active">Activo</option>
                <option value="trial">Trial</option>
                <option value="inactive">Inactivo</option>
                <option value="suspended">Suspendido</option>
              </select>
            </FormField>
            <FormField label="Plan de suscripción">
              <select value={form.plan_id} onChange={e=>setForm({...form,plan_id:e.target.value})}>
                <option value="">Sin asignar</option>
                {plans.map(p=><option key={p.id} value={p.id}>{p.name} — {fmtUSD(p.price_usd)}/mes</option>)}
              </select>
            </FormField>
            <FormField label="Fecha de alta"><input type="date" value={form.onboarding_date} onChange={e=>setForm({...form,onboarding_date:e.target.value})}/></FormField>
          </div>
          <div style={{borderTop:`1px solid ${C.border}`,marginTop:8,paddingTop:16,marginBottom:8}}>
            <div style={{fontSize:11,color:C.mid,fontWeight:600,marginBottom:12,textTransform:'uppercase',letterSpacing:.5}}>Datos del propietario</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>
              <FormField label="Nombre"><input value={form.owner_name} onChange={e=>setForm({...form,owner_name:e.target.value})} placeholder="Carlos Gómez"/></FormField>
              <FormField label="Teléfono"><input value={form.owner_phone} onChange={e=>setForm({...form,owner_phone:e.target.value})} placeholder="+595 981..."/></FormField>
              <div style={{gridColumn:'1/-1'}}>
                <FormField label="Email"><input value={form.owner_email} onChange={e=>setForm({...form,owner_email:e.target.value})} placeholder="carlos@restaurante.com" type="email"/></FormField>
              </div>
            </div>
          </div>
          <FormField label="Notas internas"><textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2} placeholder="Observaciones..."/></FormField>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <Btn variant="ghost" onClick={()=>setModal(null)}>Cancelar</Btn>
            <Btn onClick={saveRestaurant} disabled={saving}>{saving?'Guardando…':'Guardar'}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Página: Suscripciones ────────────────────────────────────
function PageSuscripciones({enriched, plans, setFlash, reload}) {
  const [editModal, setEditModal] = useState(null);
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);

  const planTotals = plans.map(p=>{
    const count = enriched.filter(r=>r.plan?.name===p.name&&r.status!=='suspended').length;
    return {...p,count};
  });

  const openEdit = r => {
    const s = r.subscription||{};
    setForm({plan_id:s.plan_id||'',status:s.status||'active',start_date:s.start_date||'',end_date:s.end_date||'',auto_renew:s.auto_renew!==false,payment_method:s.payment_method||'manual',notes:s.notes||''});
    setEditModal(r);
  };

  const saveSub = async () => {
    setSaving(true);
    try {
      if (!db) { setFlash({type:'warn',text:'Sin conexión — operación demo'}); setSaving(false); return; }
      const sub = editModal.subscription;
      if (sub?.id) {
        const {error} = await db.from('subscriptions').update({plan_id:form.plan_id,status:form.status,start_date:form.start_date,end_date:form.end_date,auto_renew:form.auto_renew,payment_method:form.payment_method,notes:form.notes||null}).eq('id',sub.id);
        if (error) throw error;
      } else {
        const {error} = await db.from('subscriptions').insert({restaurant_id:editModal.id,plan_id:form.plan_id,status:form.status,start_date:form.start_date,end_date:form.end_date,auto_renew:form.auto_renew,payment_method:form.payment_method,notes:form.notes||null});
        if (error) throw error;
      }
      await db.from('platform_events').insert({restaurant_id:editModal.id,event_type:'plan_changed',description:`Suscripción actualizada — ${plans.find(p=>p.id===form.plan_id)?.name||form.plan_id}`});
      setFlash({type:'ok',text:`Suscripción de ${editModal.name} actualizada`});
      setEditModal(null); reload();
    } catch(e) { setFlash({type:'error',text:'Error: '+e.message}); }
    setSaving(false);
  };

  const renew = async r => {
    if (!r.subscription) return;
    if (!db) { setFlash({type:'warn',text:'Sin conexión — operación demo'}); return; }
    const end = new Date(r.subscription.end_date); end.setMonth(end.getMonth()+1);
    const {error} = await db.from('subscriptions').update({status:'active',end_date:end.toISOString().slice(0,10)}).eq('id',r.subscription.id);
    if (error) { setFlash({type:'error',text:error.message}); return; }
    await db.from('platform_events').insert({restaurant_id:r.id,event_type:'subscription_renewed',description:`Renovación manual — ${r.plan?.name}`});
    setFlash({type:'ok',text:`${r.name} renovado hasta ${fmtDate(end.toISOString())}`});
    reload();
  };

  return (
    <div className="animate-in">
      <div style={{display:'flex',gap:14,marginBottom:24,flexWrap:'wrap'}}>
        {planTotals.map(p=>(
          <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'16px 22px',flex:1,minWidth:140}}>
            <PlanBadge name={p.name}/>
            <div style={{fontSize:24,fontWeight:700,marginTop:10,color:C.ink}}>{p.count}</div>
            <div style={{fontSize:12,color:C.mid,marginTop:2}}>activos · {fmtUSD(p.price_usd)}/mes</div>
          </div>
        ))}
        <div style={{background:C.card,border:`1px solid ${C.green}40`,borderRadius:10,padding:'16px 22px',flex:1,minWidth:140}}>
          <span style={{fontSize:11,fontWeight:600,color:C.mid,textTransform:'uppercase'}}>MRR Total</span>
          <div style={{fontSize:24,fontWeight:700,marginTop:10,color:C.green}}>
            {fmtUSD(enriched.filter(r=>r.status!=='suspended').reduce((s,r)=>s+(r.plan?.price_usd||0),0))}
          </div>
          <div style={{fontSize:12,color:C.mid,marginTop:2}}>mensual recurrente</div>
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead style={{background:C.surface}}>
            <tr><Th>Restaurante</Th><Th>Plan</Th><Th>Estado</Th><Th>Inicio</Th><Th>Vencimiento</Th><Th>Días restantes</Th><Th>Auto-renov.</Th><Th>Pago</Th><Th>Acciones</Th></tr>
          </thead>
          <tbody>
            {enriched.map(r=>{
              const s = r.subscription;
              const db2 = daysBadge(r.daysLeft);
              const totalDays = s ? Math.ceil((new Date(s.end_date)-new Date(s.start_date))/86400000) : 1;
              const elapsed = s ? Math.ceil((new Date()-new Date(s.start_date))/86400000) : 0;
              const pct = s ? Math.min(100,Math.max(0,(elapsed/totalDays)*100)) : 0;
              return (
                <tr key={r.id}>
                  <Td><div style={{fontWeight:600}}>{r.name}</div><div style={{fontSize:11,color:C.mid}}>{r.city}</div></Td>
                  <Td><PlanBadge name={r.plan?.name}/></Td>
                  <Td><Badge status={s?.status||'—'}/></Td>
                  <Td style={{fontSize:12,color:C.mid}}>{fmtDate(s?.start_date)}</Td>
                  <Td style={{fontSize:12,color:C.mid}}>{fmtDate(s?.end_date)}</Td>
                  <Td>
                    <div style={{display:'flex',flexDirection:'column',gap:4}}>
                      <span style={{color:db2.color,fontWeight:700,fontSize:13}}>{db2.label}</span>
                      <div style={{background:C.border,borderRadius:3,height:4,width:100,overflow:'hidden'}}>
                        <div style={{background:db2.color,height:4,borderRadius:3,width:`${pct}%`}}/>
                      </div>
                    </div>
                  </Td>
                  <Td><span style={{color:s?.auto_renew?C.green:C.dim,fontSize:12}}>{s?.auto_renew?'✓ Sí':'✗ No'}</span></Td>
                  <Td style={{fontSize:12,color:C.mid,textTransform:'capitalize'}}>{s?.payment_method||'—'}</Td>
                  <Td>
                    <div style={{display:'flex',gap:6}}>
                      <Btn size="sm" variant="ghost" onClick={()=>openEdit(r)}>Editar</Btn>
                      {s&&r.daysLeft!==null&&r.daysLeft<=30&&<Btn size="sm" variant="success" onClick={()=>renew(r)}>Renovar</Btn>}
                    </div>
                  </Td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {editModal&&(
        <Modal title={`Suscripción — ${editModal.name}`} onClose={()=>setEditModal(null)}>
          <FormField label="Plan">
            <select value={form.plan_id} onChange={e=>setForm({...form,plan_id:e.target.value})}>
              {plans.map(p=><option key={p.id} value={p.id}>{p.name} — {fmtUSD(p.price_usd)}/mes</option>)}
            </select>
          </FormField>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>
            <FormField label="Estado">
              <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                <option value="active">Activo</option>
                <option value="trial">Trial</option>
                <option value="suspended">Suspendido</option>
                <option value="expired">Vencido</option>
                <option value="cancelled">Cancelado</option>
              </select>
            </FormField>
            <FormField label="Método de pago">
              <select value={form.payment_method} onChange={e=>setForm({...form,payment_method:e.target.value})}>
                <option value="manual">Manual</option>
                <option value="transferencia">Transferencia</option>
                <option value="tarjeta">Tarjeta</option>
                <option value="efectivo">Efectivo</option>
              </select>
            </FormField>
            <FormField label="Fecha inicio"><input type="date" value={form.start_date} onChange={e=>setForm({...form,start_date:e.target.value})}/></FormField>
            <FormField label="Fecha vencimiento"><input type="date" value={form.end_date} onChange={e=>setForm({...form,end_date:e.target.value})}/></FormField>
          </div>
          <FormField label="Auto-renovar">
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <input type="checkbox" checked={form.auto_renew} onChange={e=>setForm({...form,auto_renew:e.target.checked})} style={{width:16,height:16}}/>
              <span style={{fontSize:13,color:C.mid}}>Renovar automáticamente al vencimiento</span>
            </div>
          </FormField>
          <FormField label="Notas"><textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2}/></FormField>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <Btn variant="ghost" onClick={()=>setEditModal(null)}>Cancelar</Btn>
            <Btn onClick={saveSub} disabled={saving}>{saving?'Guardando…':'Guardar'}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Página: Analytics ────────────────────────────────────────
function PageAnalytics({enriched, orders, ratings}) {
  const maxRev  = Math.max(...enriched.map(r=>r.revenue30),1);
  const maxOrd  = Math.max(...enriched.map(r=>r.orders30),1);
  const byRev   = [...enriched].sort((a,b)=>b.revenue30-a.revenue30);
  const byOrd   = [...enriched].sort((a,b)=>b.orders30-a.orders30);
  const byRat   = [...enriched].filter(r=>r.avgRating).sort((a,b)=>b.avgRating-a.avgRating);

  const totalOrders   = orders.length;
  const totalRevenue  = orders.reduce((s,o)=>s+(Number(o.total)||0),0);
  const allRatings    = ratings.map(r=>r.stars);
  const platformRating= allRatings.length ? +(avg(allRatings).toFixed(2)) : null;

  const planRevenue = {};
  enriched.forEach(r=>{ if(r.plan?.name&&r.status!=='suspended'){ planRevenue[r.plan.name]=(planRevenue[r.plan.name]||0)+(r.plan.price_usd||0); }});

  return (
    <div className="animate-in">
      <div style={{display:'flex',gap:16,marginBottom:24,flexWrap:'wrap'}}>
        <Kpi label="Total pedidos procesados" value={totalOrders.toLocaleString('es-PY')} sub="últimos 30 días" icon="📦" accent={C.cyan}/>
        <Kpi label="Volumen total"             value={fmtGuarani(totalRevenue)}            sub="últimos 30 días" icon="💵" accent={C.green}/>
        <Kpi label="Rating promedio plataforma" value={platformRating?`★ ${platformRating}`:'—'} sub={`${allRatings.length} calificaciones`} icon="⭐" accent={C.yellow}/>
        <Kpi label="Restaurantes activos"       value={enriched.filter(r=>r.status==='active').length} sub={`de ${enriched.length} totales`} icon="🏪"/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:20,marginBottom:20}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:20}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:16,color:C.ink}}>Ingresos — 30 días</div>
          {byRev.map(r=><BarRow key={r.id} label={r.name} value={r.revenue30} max={maxRev} fmt={v=>fmtGuarani(v)} color={C.green}/>)}
          {byRev.every(r=>r.revenue30===0)&&<div style={{color:C.dim,fontSize:12,textAlign:'center',padding:20}}>Sin datos de pedidos</div>}
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:20}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:16,color:C.ink}}>Cantidad de pedidos — 30d</div>
          {byOrd.map(r=><BarRow key={r.id} label={r.name} value={r.orders30} max={maxOrd} fmt={v=>`${v} ped.`} color={C.blue}/>)}
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:20}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:16,color:C.ink}}>Rating promedio</div>
          {byRat.length>0 ? byRat.map(r=><BarRow key={r.id} label={r.name} value={r.avgRating} max={5} fmt={v=>`★ ${v}`} color={C.yellow}/>) : <div style={{color:C.dim,fontSize:12,textAlign:'center',padding:20}}>Sin calificaciones</div>}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:20}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:16}}>MRR por plan</div>
          {Object.entries(planRevenue).map(([name,usd])=>(
            <div key={name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
              <PlanBadge name={name}/>
              <span style={{fontWeight:700,color:C.green}}>{fmtUSD(usd)}/mes</span>
            </div>
          ))}
          {Object.keys(planRevenue).length===0&&<div style={{color:C.dim,fontSize:12}}>Sin datos</div>}
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:20}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:16}}>Desglose de suscripciones</div>
          {['active','trial','suspended','expired'].map(st=>{
            const count = enriched.filter(r=>r.subscription?.status===st||(!r.subscription&&st==='expired')).length;
            const m = statusMeta[st]||{label:st,color:C.mid};
            return (
              <div key={st} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                <Badge status={st}/>
                <span style={{fontWeight:700,fontSize:20,color:m.color}}>{count}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Página: Actividad ────────────────────────────────────────
function PageActividad({events, restaurants, setFlash, reload}) {
  const [filterR, setFilterR] = useState('all');
  const [addModal, setAddModal] = useState(false);
  const [form, setForm] = useState({restaurant_id:'',event_type:'note_added',description:''});
  const [saving, setSaving] = useState(false);

  const shown = filterR==='all' ? events : events.filter(e=>e.restaurant_id===filterR);

  const addEvent = async () => {
    if (!form.description.trim()) { setFlash({type:'error',text:'La descripción es requerida'}); return; }
    setSaving(true);
    try {
      if (!db) { setFlash({type:'warn',text:'Sin conexión — operación demo'}); setSaving(false); return; }
      const {error} = await db.from('platform_events').insert({restaurant_id:form.restaurant_id||null,event_type:form.event_type,description:form.description});
      if (error) throw error;
      setFlash({type:'ok',text:'Evento registrado'}); setAddModal(false); reload();
    } catch(e) { setFlash({type:'error',text:'Error: '+e.message}); }
    setSaving(false);
  };

  return (
    <div className="animate-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <select value={filterR} onChange={e=>setFilterR(e.target.value)} style={{width:'auto',minWidth:180}}>
          <option value="all">Todos los restaurantes</option>
          {restaurants.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
        </select>
        <Btn onClick={()=>{setForm({restaurant_id:'',event_type:'note_added',description:''});setAddModal(true)}}>+ Registrar evento</Btn>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
        {shown.length===0&&<div style={{padding:48,textAlign:'center',color:C.dim}}>Sin eventos registrados</div>}
        {shown.map((ev,i)=>{
          const m = eventMeta[ev.event_type]||{label:ev.event_type,icon:'•',color:C.mid};
          return (
            <div key={ev.id} style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',gap:14,alignItems:'flex-start'}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:C.surface,border:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{m.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:4}}>
                  <span style={{fontWeight:700,fontSize:13,color:C.ink}}>{ev.restaurant?.name||'Plataforma'}</span>
                  <span style={{padding:'1px 8px',borderRadius:12,fontSize:11,fontWeight:600,background:C.surface,color:m.color,border:`1px solid ${m.color}30`}}>{m.label}</span>
                </div>
                <div style={{fontSize:13,color:C.mid}}>{ev.description}</div>
              </div>
              <div style={{fontSize:11,color:C.dim,whiteSpace:'nowrap'}}>{fmtDateTime(ev.created_at)}</div>
            </div>
          );
        })}
      </div>

      {addModal&&(
        <Modal title="Registrar evento manual" onClose={()=>setAddModal(false)}>
          <FormField label="Restaurante">
            <select value={form.restaurant_id} onChange={e=>setForm({...form,restaurant_id:e.target.value})}>
              <option value="">Plataforma (sin restaurante)</option>
              {restaurants.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </FormField>
          <FormField label="Tipo de evento">
            <select value={form.event_type} onChange={e=>setForm({...form,event_type:e.target.value})}>
              <option value="note_added">Nota interna</option>
              <option value="status_changed">Cambio de estado</option>
              <option value="subscription_renewed">Renovación</option>
              <option value="plan_changed">Cambio de plan</option>
              <option value="onboarding">Alta</option>
            </select>
          </FormField>
          <FormField label="Descripción *"><textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={3} placeholder="Detalle del evento..."/></FormField>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <Btn variant="ghost" onClick={()=>setAddModal(false)}>Cancelar</Btn>
            <Btn onClick={addEvent} disabled={saving}>{saving?'Guardando…':'Registrar'}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Página: Usuarios ─────────────────────────────────────────
function PageUsuarios({restaurants, setFlash}) {
  const [users, setUsers]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal]   = useState(null); // null | 'create'
  const [saving, setSaving] = useState(false);
  const [form, setForm]     = useState({username:'',display_name:'',password:'',role:'admin',restaurant_id:''});

  const ROLES = ['cocina','admin','superadmin'];
  const ROLE_COLORS = {cocina:C.cyan, admin:C.blue, superadmin:C.purple};

  const loadUsers = useCallback(async () => {
    if (!db) { setLoading(false); return; }
    setLoading(true);
    const { data, error } = await db.rpc('admin_list_users');
    if (!error && data) setUsers(data);
    setLoading(false);
  }, []);

  useEffect(() => { loadUsers(); }, [loadUsers]);

  const createUser = async () => {
    if (!form.username.trim())    { setFlash({type:'error',text:'El usuario es requerido'}); return; }
    if (form.password.length < 8) { setFlash({type:'error',text:'La contraseña debe tener al menos 8 caracteres'}); return; }
    setSaving(true);
    try {
      const safeUser = form.username.toLowerCase().replace(/[^a-z0-9._-]/g, '');
      const email = `${safeUser}.${Date.now()}@internal.mesaapp.com`;

      const { data, error } = await db.rpc('admin_create_user', {
        p_email:         email,
        p_username:      form.username.trim(),
        p_display_name:  form.display_name.trim() || form.username.trim(),
        p_role:          form.role,
        p_restaurant_id: form.restaurant_id || null,
        p_password:      form.password,
      });
      if (error) throw new Error(error.message);

      setFlash({type:'ok', text:`Usuario "${form.username}" creado correctamente`});
      setModal(null);
      setForm({username:'',display_name:'',password:'',role:'admin',restaurant_id:''});
      loadUsers();
    } catch(e) { setFlash({type:'error', text: e.message}); }
    setSaving(false);
  };

  const toggleUser = async (u) => {
    if (!db) return;
    const next = !u.is_active;
    const { error } = await db.rpc('admin_toggle_user', { p_user_id: u.user_id, p_active: next });
    if (error) { setFlash({type:'error', text: error.message}); return; }
    setFlash({type:'ok', text:`${u.display_name || u.username} → ${next ? 'activo' : 'desactivado'}`});
    loadUsers();
  };

  const restName = id => restaurants.find(r=>r.id===id)?.name || '—';

  return (
    <div className="animate-in">

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:700,color:C.ink}}>Usuarios del sistema</h2>
          <div style={{fontSize:13,color:C.mid,marginTop:3}}>
            {loading ? 'Cargando…' : `${users.length} usuario${users.length!==1?'s':''} registrado${users.length!==1?'s':''}`}
          </div>
        </div>
        <Btn onClick={()=>{ setForm({username:'',display_name:'',password:'',role:'admin',restaurant_id:''}); setModal('create'); }}>
          + Nuevo usuario
        </Btn>
      </div>

      {!db && (
        <div style={{background:'#1a1a0a',border:`1px solid ${C.yellow}40`,borderRadius:8,padding:'12px 18px',marginBottom:20,color:C.yellow,fontSize:13}}>
          Sin conexión a Supabase — gestión de usuarios no disponible en modo demo
        </div>
      )}

      {/* Tabla */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
        {loading ? (
          <div style={{padding:60,textAlign:'center',display:'flex',justifyContent:'center'}}><Spinner/></div>
        ) : users.length === 0 ? (
          <div style={{padding:60,textAlign:'center'}}>
            <div style={{fontSize:32,marginBottom:12,opacity:.3}}>👥</div>
            <div style={{color:C.mid,fontSize:14,fontWeight:500}}>Sin usuarios registrados</div>
            <div style={{color:C.dim,fontSize:12,marginTop:6}}>Creá el primer usuario con el botón de arriba</div>
          </div>
        ) : (
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead style={{background:C.surface}}>
              <tr>
                <Th>Usuario</Th>
                <Th>Nombre</Th>
                <Th>Rol</Th>
                <Th>Restaurante</Th>
                <Th>Estado</Th>
                <Th style={{textAlign:'right'}}>Acción</Th>
              </tr>
            </thead>
            <tbody>
              {users.map(u => (
                <tr key={u.id} style={{transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#1a1a24'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <Td>
                    <div style={{fontFamily:'monospace',fontSize:13,color:C.ink,fontWeight:600}}>{u.username||'—'}</div>
                    <div style={{fontSize:11,color:C.dim,marginTop:2}}>{u.email||''}</div>
                  </Td>
                  <Td style={{fontWeight:500,color:C.ink}}>{u.display_name||'—'}</Td>
                  <Td>
                    <span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:(ROLE_COLORS[u.role]||C.mid)+'22',color:ROLE_COLORS[u.role]||C.mid}}>
                      {u.role}
                    </span>
                  </Td>
                  <Td style={{fontSize:13,color:C.mid}}>
                    {u.restaurant_id ? restName(u.restaurant_id) : <span style={{color:C.dim,fontStyle:'italic'}}>Todos</span>}
                  </Td>
                  <Td>
                    <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,color:u.is_active?C.green:C.dim}}>
                      <span style={{width:6,height:6,borderRadius:'50%',background:u.is_active?C.green:C.dim}}/>
                      {u.is_active?'Activo':'Inactivo'}
                    </span>
                  </Td>
                  <Td style={{textAlign:'right'}}>
                    <Btn size="sm" variant={u.is_active?'danger':'success'} onClick={()=>toggleUser(u)}>
                      {u.is_active?'Desactivar':'Activar'}
                    </Btn>
                  </Td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* Modal crear usuario */}
      {modal==='create' && (
        <div style={{position:'fixed',inset:0,background:'#00000090',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:'24px 16px'}}>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,width:'100%',maxWidth:520,boxShadow:'0 24px 64px #00000080'}} className="animate-in">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 24px',borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontWeight:700,fontSize:16,color:C.ink}}>Nuevo usuario</span>
              <button onClick={()=>setModal(null)} style={{background:'none',border:'none',color:C.mid,fontSize:20,cursor:'pointer',lineHeight:1}}>✕</button>
            </div>
            <div style={{padding:24,display:'flex',flexDirection:'column',gap:14}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <FormField label="Usuario *" hint="Nombre de login (sin espacios)">
                  <input value={form.username} onChange={e=>setForm({...form,username:e.target.value})} placeholder="ej: jperez" autoFocus/>
                </FormField>
                <FormField label="Contraseña *" hint="Mínimo 8 caracteres">
                  <input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="••••••••"/>
                </FormField>
                <FormField label="Nombre para mostrar" hint="Opcional — si se deja vacío usa el usuario">
                  <input value={form.display_name} onChange={e=>setForm({...form,display_name:e.target.value})} placeholder="ej: Juan Pérez"/>
                </FormField>
                <FormField label="Rol">
                  <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
                  </select>
                </FormField>
              </div>
              <FormField label="Restaurante asignado" hint="Dejar vacío = acceso a todos los restaurantes">
                <select value={form.restaurant_id} onChange={e=>setForm({...form,restaurant_id:e.target.value})}>
                  <option value="">Todos los restaurantes</option>
                  {restaurants.map(r=><option key={r.id} value={r.id}>{r.name} — {r.city}</option>)}
                </select>
              </FormField>
              <div style={{background:'#0d0d18',border:`1px solid ${C.border}`,borderRadius:6,padding:'10px 14px',fontSize:12,color:C.dim}}>
                El usuario inicia sesión en <strong style={{color:C.mid,fontFamily:'monospace'}}>{window.location.origin}/login.html</strong> con su usuario y contraseña.
              </div>
              <div style={{display:'flex',gap:10,justifyContent:'flex-end',paddingTop:4}}>
                <Btn variant="ghost" onClick={()=>setModal(null)}>Cancelar</Btn>
                <Btn onClick={createUser} disabled={saving}>{saving?'Creando…':'Crear usuario'}</Btn>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Página: Stock e Inventario ───────────────────────────────
function PageStock({restaurants, setFlash}) {
  const [restId, setRestId]         = useState(restaurants[0]?.id || '');
  const [tab, setTab]               = useState('inventario'); // inventario | cargar | recetas | movimientos
  const [ingredients, setIngredients] = useState([]);
  const [menuItems, setMenuItems]   = useState([]);
  const [recipes, setRecipes]       = useState([]);
  const [movements, setMovements]   = useState([]);
  const [alerts, setAlerts]         = useState([]);
  const [loading, setLoading]       = useState(false);
  const [modal, setModal]           = useState(null); // null|'new_ing'|'load_stock'|'new_recipe'
  const [saving, setSaving]         = useState(false);

  // Formularios
  const emptyIng = {name:'',category:'',unit:'unit',min_threshold:'0',cost_per_unit:'',stock_quantity:'0'};
  const [ingForm, setIngForm]       = useState(emptyIng);
  const emptyLoad = {ingredient_id:'',quantity:'',unit:'unit',expiry_date:'',batch_id:'',cost_per_unit:'',notes:''};
  const [loadForm, setLoadForm]     = useState(emptyLoad);
  const emptyRec = {menu_item_id:'',ingredient_id:'',quantity_required:'1',unit:'unit',notes:''};
  const [recForm, setRecForm]       = useState(emptyRec);

  const UNIT_LABELS = {g:'g (gramos)',kg:'kg (kilogramos)',l:'L (litros)',ml:'ml (mililitros)',unit:'unidades enteras',portion:'porciones'};
  const UNIT_DISPLAY = {g:'g',kg:'kg',l:'L',ml:'ml',unit:'u',portion:'p'};

  const fmtStock = (qty, unit) => {
    // Almacenamiento interno: siempre en unidad base (g o ml)
    // Mostrar en kg si >= 1000g, en L si >= 1000ml
    if ((unit === 'g' || unit === 'kg') && qty >= 1000) return `${(qty/1000).toFixed(2)} kg`;
    if ((unit === 'ml' || unit === 'l') && qty >= 1000) return `${(qty/1000).toFixed(2)} L`;
    return `${qty} ${UNIT_DISPLAY[unit]||unit}`;
  };

  const stockColor = lvl => ({ok:C.green, bajo:C.yellow, critico:C.orange, sin_stock:C.red}[lvl]||C.mid);
  const stockLabel = lvl => ({ok:'OK', bajo:'Bajo', critico:'Crítico', sin_stock:'Sin stock'}[lvl]||lvl);

  const loadData = useCallback(async () => {
    if (!db || !restId) return;
    setLoading(true);
    try {
      const [ingsRes, itemsRes, recsRes, movsRes, alertsRes] = await Promise.all([
        db.rpc('admin_list_ingredients', {p_restaurant_id: restId}),
        db.from('menu_items').select('id,name,is_available,availability_reason').eq('restaurant_id', restId).eq('is_active', true).order('name'),
        db.from('recipes').select('*').then(async r => {
          if (r.error) return {data:[]};
          // Solo los de este restaurante (via ingredients)
          const ingIds = (await db.from('ingredients').select('id').eq('restaurant_id', restId)).data?.map(i=>i.id)||[];
          return {data: (r.data||[]).filter(rec => ingIds.includes(rec.ingredient_id))};
        }),
        db.from('stock_movements').select('*, ingredient:ingredients(name,unit)').eq('restaurant_id', restId).order('created_at',{ascending:false}).limit(100),
        db.from('stock_alerts').select('*, ingredient:ingredients(name,unit)').eq('restaurant_id', restId).is('resolved_at', null).order('created_at',{ascending:false}).limit(30),
      ]);
      setIngredients(ingsRes.data || []);
      setMenuItems(itemsRes.data || []);
      setRecipes(recsRes.data || []);
      setMovements(movsRes.data || []);
      setAlerts(alertsRes.data || []);
    } catch(e) { console.error(e); }
    setLoading(false);
  }, [restId]);

  useEffect(() => { loadData(); }, [loadData]);

  // Realtime: actualizar cuando cambia stock
  useEffect(() => {
    if (!db || !restId) return;
    const ch = db.channel('stock-admin-rt')
      .on('postgres_changes',{event:'*',schema:'public',table:'ingredients',filter:`restaurant_id=eq.${restId}`}, loadData)
      .on('postgres_changes',{event:'*',schema:'public',table:'stock_alerts',filter:`restaurant_id=eq.${restId}`}, loadData)
      .subscribe();
    return () => db.removeChannel(ch);
  }, [restId, loadData]);

  const createIngredient = async () => {
    if (!ingForm.name.trim()) { setFlash({type:'warn',text:'El nombre es requerido'}); return; }
    setSaving(true);
    try {
      const {error} = await db.from('ingredients').insert({
        restaurant_id: restId,
        name: ingForm.name.trim(),
        category: ingForm.category.trim() || null,
        unit: ingForm.unit,
        stock_quantity: parseFloat(ingForm.stock_quantity)||0,
        min_threshold: parseFloat(ingForm.min_threshold)||0,
        cost_per_unit: ingForm.cost_per_unit ? parseFloat(ingForm.cost_per_unit) : null,
      });
      if (error) throw error;
      setFlash({type:'ok',text:'Ingrediente creado'});
      setModal(null);
      setIngForm(emptyIng);
      loadData();
    } catch(e) { setFlash({type:'error',text:'Error: '+e.message}); }
    setSaving(false);
  };

  const loadStock = async () => {
    if (!loadForm.ingredient_id) { setFlash({type:'warn',text:'Seleccioná un ingrediente'}); return; }
    if (!loadForm.quantity || parseFloat(loadForm.quantity)<=0) { setFlash({type:'warn',text:'Cantidad inválida'}); return; }
    setSaving(true);
    try {
      const {error} = await db.rpc('admin_load_stock', {
        p_ingredient_id: loadForm.ingredient_id,
        p_quantity:      parseFloat(loadForm.quantity),
        p_unit:          loadForm.unit,
        p_expiry_date:   loadForm.expiry_date || null,
        p_batch_id:      loadForm.batch_id || null,
        p_cost_per_unit: loadForm.cost_per_unit ? parseFloat(loadForm.cost_per_unit) : null,
        p_notes:         loadForm.notes || null,
      });
      if (error) throw error;
      setFlash({type:'ok',text:'Stock cargado correctamente'});
      setModal(null);
      setLoadForm(emptyLoad);
      loadData();
    } catch(e) { setFlash({type:'error',text:'Error: '+e.message}); }
    setSaving(false);
  };

  const createRecipe = async () => {
    if (!recForm.menu_item_id || !recForm.ingredient_id) { setFlash({type:'warn',text:'Seleccioná ítem e ingrediente'}); return; }
    setSaving(true);
    try {
      const {error} = await db.from('recipes').insert({
        menu_item_id:      parseInt(recForm.menu_item_id),
        ingredient_id:     recForm.ingredient_id,
        quantity_required: parseFloat(recForm.quantity_required)||1,
        unit:              recForm.unit,
        notes:             recForm.notes || null,
      });
      if (error) throw error;
      setFlash({type:'ok',text:'Receta guardada'});
      setModal(null);
      setRecForm(emptyRec);
      loadData();
    } catch(e) { setFlash({type:'error',text:'Error: '+e.message}); }
    setSaving(false);
  };

  const deleteRecipe = async (id) => {
    const {error} = await db.from('recipes').delete().eq('id', id);
    if (error) { setFlash({type:'error',text:'Error: '+error.message}); return; }
    setFlash({type:'ok',text:'Receta eliminada'});
    loadData();
  };

  const ingName = id => ingredients.find(i=>i.id===id)?.name || id;
  const itemName = id => menuItems.find(i=>i.id===parseInt(id))?.name || id;

  const mvtIcon = t => ({load:'↑',deduct:'↓',adjustment:'≈',waste:'✕',expired:'⚠'}[t]||'•');
  const mvtColor = t => ({load:C.green,deduct:C.cyan,adjustment:C.yellow,waste:C.orange,expired:C.red}[t]||C.mid);

  const alertIcon = t => ({low_stock:'⚠',critical_stock:'🔴',expiring_soon:'📅',expired:'💀'}[t]||'•');
  const alertColor = t => ({low_stock:C.yellow,critical_stock:C.red,expiring_soon:C.orange,expired:C.red}[t]||C.mid);
  const alertLabel = t => ({low_stock:'Stock bajo',critical_stock:'Stock crítico',expiring_soon:'Por vencer',expired:'Vencido'}[t]||t);

  const resolveAlert = async (id) => {
    const {error} = await db.from('stock_alerts').update({resolved_at: new Date().toISOString()}).eq('id',id);
    if (!error) loadData();
  };

  const TabBtn = ({id,label}) => (
    <button onClick={()=>setTab(id)} style={{
      padding:'7px 16px',borderRadius:6,border:'none',fontFamily:'inherit',fontSize:13,fontWeight:600,cursor:'pointer',
      background: tab===id ? C.blue : 'transparent',
      color: tab===id ? '#fff' : C.mid,
      transition:'all .15s',
    }}>{label}</button>
  );

  return (
    <div className="animate-in">
      {/* Header con selector de restaurante y tabs */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',gap:6,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:4}}>
          <TabBtn id="inventario"   label="Inventario"/>
          <TabBtn id="cargar"       label="Cargar stock"/>
          <TabBtn id="recetas"      label="Recetas"/>
          <TabBtn id="movimientos"  label="Movimientos"/>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <select value={restId} onChange={e=>setRestId(e.target.value)} style={{width:200,fontSize:13}}>
            {restaurants.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
          </select>
          <button onClick={loadData} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 12px',color:C.mid,fontSize:12,cursor:'pointer'}}>↺</button>
        </div>
      </div>

      {/* Alertas activas */}
      {alerts.length > 0 && (
        <div style={{marginBottom:16,display:'flex',flexDirection:'column',gap:6}}>
          {alerts.map(al=>(
            <div key={al.id} style={{background:'#160808',border:`1px solid ${alertColor(al.alert_type)}40`,borderRadius:8,padding:'10px 16px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:16}}>{alertIcon(al.alert_type)}</span>
              <div style={{flex:1}}>
                <span style={{fontWeight:700,fontSize:13,color:alertColor(al.alert_type)}}>{alertLabel(al.alert_type)}: </span>
                <span style={{fontSize:13,color:C.ink}}>{al.ingredient?.name||'—'}</span>
                {al.current_value!=null && <span style={{fontSize:11,color:C.mid,marginLeft:8}}>({fmtStock(al.current_value, al.ingredient?.unit||'unit')} actual)</span>}
              </div>
              <Btn size="sm" variant="ghost" onClick={()=>resolveAlert(al.id)}>Resolver</Btn>
            </div>
          ))}
        </div>
      )}

      {loading ? (
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',height:200,gap:14}}>
          <Spinner/><span style={{color:C.mid}}>Cargando inventario…</span>
        </div>
      ) : (

        <>
        {/* ── TAB: INVENTARIO ─────────────────────────────────── */}
        {tab==='inventario' && (
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <span style={{fontSize:13,color:C.mid}}>{ingredients.length} ingredientes registrados</span>

            </div>

            {ingredients.length === 0 ? (
              <div style={{textAlign:'center',padding:'60px 0',color:C.dim,fontSize:14}}>

              </div>
            ) : (
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead style={{background:C.surface}}>
                    <tr>
                      <Th>Ingrediente</Th><Th>Stock actual</Th><Th>Umbral mín.</Th>
                      <Th>Proyectado</Th><Th>Estado</Th><Th>Vence</Th>
                    </tr>
                  </thead>
                  <tbody>
                    {ingredients.map(ing => {
                      const lvlColor = stockColor(ing.stock_level);
                      const projDiff = ing.projected_qty - ing.stock_quantity;
                      return (
                        <tr key={ing.id}>
                          <Td>
                            <div style={{fontWeight:600,color:C.ink}}>{ing.name}</div>
                            {ing.category&&<div style={{fontSize:11,color:C.dim}}>{ing.category}</div>}
                          </Td>
                          <Td>
                            <span style={{fontWeight:700,color:lvlColor,fontFamily:'monospace'}}>
                              {fmtStock(ing.stock_quantity, ing.unit)}
                            </span>
                          </Td>
                          <Td style={{color:C.mid,fontSize:12,fontFamily:'monospace'}}>
                            {ing.min_threshold > 0 ? fmtStock(ing.min_threshold, ing.unit) : '—'}
                          </Td>
                          <Td>
                            <span style={{fontFamily:'monospace',fontSize:12,color: ing.projected_qty < 0 ? C.red : ing.projected_qty < ing.min_threshold ? C.orange : C.mid}}>

                    <select value={ingForm.unit} onChange={e=>setIngForm({...ingForm,unit:e.target.value})}>

                  <FormField label="Umbral mínimo" hint="Alerta cuando baje de este nivel">

                  </FormField>
                </div>
                <div style={{paddingTop:4}}>
                  <Btn onClick={createIngredient} disabled={saving} style={{width:'100%'}}>{saving?'Guardando…':'Crear ingrediente'}</Btn>

              </div>
            </div>
          </div>
        )}

        {/* ── TAB: RECETAS ────────────────────────────────────── */}
        {tab==='recetas' && (
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <span style={{fontSize:13,color:C.mid}}>Vinculá ingredientes a los ítems del menú para activar el descuento automático de stock</span>
              <Btn size="sm" onClick={()=>setModal('new_recipe')}>+ Nueva receta</Btn>
            </div>

            {recipes.length === 0 ? (
              <div style={{textAlign:'center',padding:'60px 0',color:C.dim,fontSize:14}}>

                <span style={{fontSize:12}}>Los ítems sin receta no descontarán stock automáticamente.</span>
              </div>
            ) : (
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead style={{background:C.surface}}>
                    <tr><Th>Ítem del menú</Th><Th>Ingrediente</Th><Th>Cantidad/porción</Th><Th>Notas</Th><Th></Th></tr>
                  </thead>
                  <tbody>
                    {recipes.map(rec=>(
                      <tr key={rec.id}>
                        <Td style={{fontWeight:600}}>{itemName(rec.menu_item_id)}</Td>
                        <Td>{ingName(rec.ingredient_id)}</Td>
                        <Td style={{fontFamily:'monospace',fontSize:12}}>{rec.quantity_required} {UNIT_DISPLAY[rec.unit]||rec.unit}</Td>
                        <Td style={{color:C.dim,fontSize:12}}>{rec.notes||'—'}</Td>
                        <Td style={{textAlign:'right'}}><Btn size="sm" variant="danger" onClick={()=>deleteRecipe(rec.id)}>Eliminar</Btn></Td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {/* ── TAB: MOVIMIENTOS ────────────────────────────────── */}
        {tab==='movimientos' && (
          <div>
            <div style={{marginBottom:14,fontSize:13,color:C.mid}}>Últimos 100 movimientos de stock</div>
            {movements.length === 0 ? (
              <div style={{textAlign:'center',padding:'60px 0',color:C.dim,fontSize:14}}>No hay movimientos registrados aún.</div>
            ) : (
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead style={{background:C.surface}}>
                    <tr><Th>Fecha</Th><Th>Tipo</Th><Th>Ingrediente</Th><Th>Cantidad</Th><Th>Notas</Th></tr>
                  </thead>
                  <tbody>
                    {movements.map(mv=>{
                      const col = mvtColor(mv.movement_type);
                      return (
                        <tr key={mv.id}>
                          <Td style={{fontSize:11,color:C.dim,fontFamily:'monospace'}}>{fmtDateTime(mv.created_at)}</Td>
                          <Td>
                            <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:700,background:col+'22',color:col}}>
                              {mvtIcon(mv.movement_type)} {mv.movement_type}
                            </span>
                          </Td>
                          <Td style={{fontWeight:500}}>{mv.ingredient?.name||'—'}</Td>
                          <Td style={{fontFamily:'monospace',fontSize:12,color:mv.movement_type==='load'?C.green:C.red}}>
                            {mv.movement_type==='load'?'+':'-'}{fmtStock(mv.quantity, mv.ingredient?.unit||'unit')}
                          </Td>
                          <Td style={{fontSize:12,color:C.dim}}>{mv.notes||'—'}</Td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
        </>
      )}

      {/* Modal: nueva receta */}
      {modal==='new_recipe' && (
        <Modal title="Nueva receta" onClose={()=>setModal(null)} width={480}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <FormField label="Ítem del menú *">
              <select value={recForm.menu_item_id} onChange={e=>setRecForm({...recForm,menu_item_id:e.target.value})}>
                <option value="">— Seleccioná un ítem —</option>
                {menuItems.map(mi=><option key={mi.id} value={mi.id}>{mi.name}</option>)}
              </select>
            </FormField>
            <FormField label="Ingrediente *">
              <select value={recForm.ingredient_id} onChange={e=>setRecForm({...recForm,ingredient_id:e.target.value,unit:(ingredients.find(i=>i.id===e.target.value)?.unit||'unit')})}>
                <option value="">— Seleccioná un ingrediente —</option>
                {ingredients.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}
              </select>
            </FormField>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}}>
              <FormField label="Cantidad por porción *">
                <input type="number" min="0.001" step="0.001" value={recForm.quantity_required} onChange={e=>setRecForm({...recForm,quantity_required:e.target.value})}/>
              </FormField>
              <FormField label="Unidad">
                <select value={recForm.unit} onChange={e=>setRecForm({...recForm,unit:e.target.value})}>
                  {Object.entries(UNIT_LABELS).map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </FormField>
            </div>
            <FormField label="Notas" hint="Opcional — ej: 'Sin grasa'">
              <input value={recForm.notes} onChange={e=>setRecForm({...recForm,notes:e.target.value})} placeholder="Opcional"/>
            </FormField>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',paddingTop:4}}>
              <Btn variant="ghost" onClick={()=>setModal(null)}>Cancelar</Btn>
              <Btn onClick={createRecipe} disabled={saving}>{saving?'Guardando…':'Guardar receta'}</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

  {id:'ecosistemas',  label:'Ecosistemas',   icon:'🏪'},
  {id:'suscripciones',label:'Suscripciones', icon:'🔑'},
  {id:'analytics',    label:'Analytics',     icon:'📊'},
  {id:'actividad',    label:'Actividad',     icon:'📋'},

];

        ))}
        {db&&(
          <button onClick={async()=>{await db.auth.signOut();window.location.replace('login.html');}}
            style={{marginTop:10,width:'100%',background:'transparent',border:`1px solid ${C.border}`,borderRadius:6,color:C.dim,fontSize:12,padding:'6px',cursor:'pointer',fontFamily:'inherit'}}>
            Cerrar sesión

// ── App principal ────────────────────────────────────────────
function App() {
  const [page, setPage]         = useState('overview');
  const [loading, setLoading]   = useState(true);
  const [flash, setFlash]       = useState(null);
  const [offline, setOffline]   = useState(false);
  const [rtLive, setRtLive]     = useState(false);
  const [rawData, setRawData]   = useState({restaurants:[],plans:[],subscriptions:[],events:[],orders:[],ratings:[]});

  const loadAll = useCallback(async () => {
    if (!db) {
      setRawData(DEMO);
      setOffline(true);
      setLoading(false);
      return;
    }
    setLoading(true);
    try {
      const ago30 = new Date(Date.now()-30*86400000).toISOString();
      const [rests,subs,plans,events,orders,ratings] = await Promise.all([
        db.from('restaurants').select('*').order('created_at',{ascending:false}),
        db.from('subscriptions').select('*, plan:subscription_plans(id,name,price_usd,billing_cycle)').then(r=>r.error?{data:[]}:r),
        db.from('subscription_plans').select('*').eq('is_active',true).order('price_usd').then(r=>r.error?{data:[]}:r),
        db.from('platform_events').select('*, restaurant:restaurants(name)').order('created_at',{ascending:false}).limit(50).then(r=>r.error?{data:[]}:r),
        db.from('orders').select('id,restaurant_id,total,created_at,status').gte('created_at',ago30).then(r=>r.error?{data:[]}:r),
        db.from('ratings').select('restaurant_id,stars').then(r=>r.error?{data:[]}:r),
      ]);
      if (rests.error) throw rests.error;
      const subsWithPlan = (subs.data||[]).map(s=>({...s,plan:s.plan}));
      setRawData({restaurants:rests.data||[],subscriptions:subsWithPlan,plans:plans.data||[],events:events.data||[],orders:orders.data||[],ratings:ratings.data||[]});
      setOffline(false);
    } catch(e) {
      console.warn('Error cargando datos:',e);
      setRawData(DEMO);
      setOffline(true);
      setFlash({type:'warn',text:'Sin conexión a Supabase — mostrando datos demo'});
    }
    setLoading(false);
  }, []);

  useEffect(()=>{ loadAll(); }, [loadAll]);

  useEffect(()=>{
    if (!db) return;
    const channel = db.channel('superadmin-rt')
      .on('postgres_changes',{event:'*',schema:'public',table:'orders'},        loadAll)
      .on('postgres_changes',{event:'*',schema:'public',table:'restaurants'},   loadAll)
      .on('postgres_changes',{event:'*',schema:'public',table:'subscriptions'}, loadAll)
      .on('postgres_changes',{event:'*',schema:'public',table:'platform_events'},loadAll)
      .subscribe(status => setRtLive(status==='SUBSCRIBED'));
    return ()=>{ db.removeChannel(channel); };
  }, [loadAll]);

  const {restaurants,plans,subscriptions,events,orders,ratings} = rawData;
  const enriched = buildAnalytics(restaurants, orders, ratings, subscriptions, plans);

  const pageTitles = {overview:'Plataforma',ecosistemas:'Ecosistemas',suscripciones:'Suscripciones',analytics:'Analytics',actividad:'Actividad',usuarios:'Usuarios',stock:'Stock e Inventario'};

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        {/* Header */}
        <div style={{background:C.sidebar,borderBottom:`1px solid ${C.border}`,padding:'14px 28px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:10}}>
          <div style={{fontWeight:700,fontSize:16,color:C.ink}}>{pageTitles[page]}</div>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            {offline&&<span style={{fontSize:11,color:C.yellow,fontWeight:600,background:'#2a2010',padding:'3px 10px',borderRadius:12}}>● Demo offline</span>}
            {!offline&&!loading&&rtLive&&<span style={{fontSize:11,color:C.green,fontWeight:600,background:'#102010',padding:'3px 10px',borderRadius:12}} className="pulse">● En vivo</span>}
            {!offline&&!loading&&!rtLive&&<span style={{fontSize:11,color:C.mid,fontWeight:600,background:C.surface,padding:'3px 10px',borderRadius:12}}>● Conectado</span>}
            {window._userProfile&&<span style={{fontSize:12,color:C.mid,fontWeight:600}}>{window._userProfile.display_name||window._userProfile.username}</span>}
            <button onClick={loadAll} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'6px 12px',color:C.mid,fontSize:12,cursor:'pointer'}}>↺ Actualizar</button>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,padding:28,overflowY:'auto'}}>
          {loading ? (
            <div style={{display:'flex',justifyContent:'center',alignItems:'center',height:200,gap:14}}>
              <Spinner/><span style={{color:C.mid}}>Cargando plataforma…</span>
            </div>
          ) : (
            <>
              {page==='overview'      && <PageOverview     enriched={enriched} events={events} plans={plans} setFlash={setFlash} reload={loadAll}/>}
              {page==='ecosistemas'   && <PageEcosistemas  enriched={enriched} plans={plans}   setFlash={setFlash} reload={loadAll}/>}
              {page==='suscripciones' && <PageSuscripciones enriched={enriched} plans={plans} setFlash={setFlash} reload={loadAll}/>}
              {page==='analytics'     && <PageAnalytics    enriched={enriched} orders={orders} ratings={ratings}/>}
              {page==='actividad'     && <PageActividad    events={events} restaurants={restaurants} setFlash={setFlash} reload={loadAll}/>}
              {page==='usuarios'      && <PageUsuarios     restaurants={restaurants} setFlash={setFlash}/>}
              {page==='stock'         && <PageStock        restaurants={restaurants} setFlash={setFlash}/>}
            </>
          )}
        </div>
      </div>
      <FlashMsg msg={flash} onClose={()=>setFlash(null)}/>
    </div>
  );
}

// Auth guard — solo superadmin
async function bootstrap() {
  if (!db) { window.location.replace('login.html'); return; }
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.replace('login.html'); return; }
  const { data: profile } = await db.rpc('get_my_profile');
  if (!profile || profile.role !== 'superadmin') {
    await db.auth.signOut();
    window.location.replace('login.html');
    return;
  }
  window._userProfile = profile;
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
bootstrap();
</script>
</body>
</html>
