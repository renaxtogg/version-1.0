  try { return window.supabase.createClient(cfg.url, cfg.anonKey); } catch(e) { return null; }
};

/* ── SUPABASE HELPERS ────────────────────── */
async function dbLoadMenu() {
  if (!db) return null;
  try {
    const { data: cats } = await db.from('menu_categories').select('id,name,sort_order').eq('restaurant_id', RESTAURANT_ID).order('sort_order');
    const { data: items } = await db.from('menu_items').select('id,category_id,name,description,price_guarani,promo_tag,menu_item_extras(id,name,price_guarani)').eq('restaurant_id', RESTAURANT_ID).eq('is_available', true).order('sort_order');
    if (!cats || !items) return null;
    const menu = {};
    for (const cat of cats) {
      menu[cat.name] = items.filter(i => i.category_id === cat.id).map(i => ({
        id: i.id, name: i.name, desc: i.description, price: i.price_guarani,
        promo: i.promo_tag ? { tag: i.promo_tag } : null,
        extras: (i.menu_item_extras || []).map(e => ({ n: e.name, p: e.price_guarani }))
      }));
    }
    return Object.keys(menu).length > 0 ? menu : null;
  } catch(e) { console.warn('Supabase menu load failed, using static data'); return null; }
}

async function dbValidateCoupon(code) {
  if (!db) return code.toUpperCase() === 'MESA10' ? { discount_type: 'percentage', discount_value: 10 } : null;
  try {
    const { data } = await db.from('coupons').select('*').eq('restaurant_id', RESTAURANT_ID).eq('code', code.toUpperCase()).eq('is_active', true).maybeSingle();
    return data;
  } catch(e) { return code.toUpperCase() === 'MESA10' ? { discount_type: 'percentage', discount_value: 10 } : null; }
}

async function dbSubmitOrder({ tableId, orderType, items, subtotal, discountAmount, couponCode, total, payMethod, custName, custRuc, custEmail, language }) {
  const orderNum = 'T-' + String(Math.floor(Date.now() % 90000) + 10000);
  if (!db) return { id: null, order_number: orderNum };
  try {
    const { data: order, error } = await db.from('orders').insert({
      restaurant_id: RESTAURANT_ID, table_id: tableId || null, order_number: orderNum,
      order_type: orderType, status: 'paid', subtotal, discount_amount: discountAmount || 0,
      coupon_code: couponCode || null, total, payment_method: payMethod,
      customer_name: custName || null, customer_ruc: custRuc || null,
      customer_email: custEmail || null, language
    }).select().single();
    if (error || !order) return { id: null, order_number: orderNum };
    for (const ci of items) {
      const { data: oi } = await db.from('order_items').insert({
        order_id: order.id, item_id: ci.item.id || null, item_name: ci.item.name,
        quantity: ci.qty, unit_price: ci.item.price, total_price: ci.total,
        observations: ci.notes || null
      }).select().single();
      if (oi && ci.extras && ci.extras.length > 0) {
        await db.from('order_item_extras').insert(ci.extras.map(e => ({ order_item_id: oi.id, extra_name: e.n, extra_price: e.p })));
      }
    }
    await db.from('order_status_history').insert({ order_id: order.id, status: 'paid', changed_by: 'customer' });
    return order;
  } catch(e) { console.warn('Order submit error:', e); return { id: null, order_number: orderNum }; }
}

async function dbCallWaiter(tableId, orderId) {
  if (!db) return;
  try { await db.from('waiter_calls').insert({ restaurant_id: RESTAURANT_ID, table_id: tableId || null, order_id: orderId || null, status: 'pending' }); } catch(e) {}
}

async function dbSubmitRating(orderId, tableId, stars, comment) {
  if (!db) return;
  try { await db.from('ratings').insert({ restaurant_id: RESTAURANT_ID, order_id: orderId || null, table_id: tableId || null, stars, comment: comment || null }); } catch(e) {}
}

function dbSubscribeOrder(orderId, onStatusChange) {
  if (!db || !orderId) return null;
  return db.channel('order-' + orderId)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders', filter: 'id=eq.' + orderId }, p => onStatusChange(p.new.status))
    .subscribe();
}

/* ── TOAST ───────────────────────────────── */
function Toast({ msg, onHide }) {
  const T = useContext(ThemeCtx);
  useEffect(() => { const t = setTimeout(onHide, 2400); return () => clearTimeout(t); }, []);
  return <div style={{ position: 'fixed', top: 60, left: '50%', transform: 'translateX(-50%)', background: T.ink, color: T.white, borderRadius: 9999, padding: '10px 20px', fontSize: 13, fontWeight: 600, zIndex: 9999, whiteSpace: 'nowrap', boxShadow: '0 8px 32px rgba(0,0,0,0.4)', animation: 'fadeIn 200ms' }}>{msg}</div>;
}

/* ── OFFLINE BANNER ──────────────────────── */
function OfflineBanner() {
  const T = useContext(ThemeCtx);
  const [offline, setOffline] = useState(!navigator.onLine);
  useEffect(() => {
    const on = () => setOffline(false), off = () => setOffline(true);
    window.addEventListener('online', on); window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);
  if (!offline) return null;
  return <div style={{ position: 'fixed', top: 0, left: '50%', transform: 'translateX(-50%)', width: 390, background: T.ink, color: T.white, textAlign: 'center', fontSize: 12, fontWeight: 600, padding: '8px', zIndex: 9998, letterSpacing: '0.04em' }}>Sin conexión — tu pedido se guardó</div>;
}

          <div style={{ position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)', width: 36, height: 4, borderRadius: 2, background: 'rgba(255,255,255,0.2)' }} />

        <div style={{ padding: '20px 20px 32px' }}>

function CartScreen({ items, onBack, onPay, onRemove, onQty, onCouponApplied }) {
  const T = useContext(ThemeCtx);
  const [coupon, setCoupon] = useState('');
  const [applied, setApplied] = useState(false);
  const [appliedCode, setAppliedCode] = useState('');
  const [discAmount, setDiscAmount] = useState(0);
  const [validating, setValidating] = useState(false);
  const sub = items.reduce((s, ci) => s + ci.total, 0);
  const total = sub - discAmount;

  const applyCode = async () => {
    if (!coupon.trim()) return;
    setValidating(true);
    const data = await dbValidateCoupon(coupon.trim());
    setValidating(false);
    if (data) {
      const disc = data.discount_type === 'percentage' ? Math.round(sub * data.discount_value / 100) : Math.min(data.discount_value, sub);
      setApplied(true);
      setAppliedCode(coupon.trim().toUpperCase());
      setDiscAmount(disc);
      if (onCouponApplied) onCouponApplied(coupon.trim().toUpperCase(), disc);

  return (
    <div style={{ minHeight: '844px', background: T.offwhite, display: 'flex', flexDirection: 'column' }}>

          </div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 12, paddingTop: 10, borderTop: `1px solid ${T.border}` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <button onClick={() => onQty(i, -1)} style={{ width: 30, height: 30, background: T.light, border: `1px solid ${T.border}`, borderRadius: 8, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="minus" size={12} color={T.ink} /></button>

/* ══ SCREEN: SEGUIMIENTO ════════════════ */
function TrackingScreen({ onRate, orderNumber }) {
  const T = useContext(ThemeCtx);
  const STEPS = [{ label: 'Pago confirmado', sub: 'Recibimos tu pago' }, { label: 'Pedido recibido', sub: 'El local tiene tu pedido' }, { label: 'Cocina recibió tu pedido', sub: `Ticket ${orderNumber || '#????'} en cola` }, { label: 'Cocinando', sub: 'Tu plato está en preparación' }, { label: 'Listo para retirar', sub: '¡Tu pedido está listo!' }, { label: 'Entregado', sub: '¡Buen provecho!' }];
  const STATUS_MAP = { paid: 1, kitchen_received: 2, cooking: 3, ready: 4, delivered: 5 };
  const [active, setActive] = useState(1);

  useEffect(() => {
    let sub = null;
    if (db && orderNumber) {
      dbLoadOrder(orderNumber).then(ord => {
        if (ord) setActive(STATUS_MAP[ord.status] || 1);
      });
      sub = db.channel('track-' + orderNumber)
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders' }, p => {
          if (p.new.order_number === orderNumber) setActive(STATUS_MAP[p.new.status] || active);
        }).subscribe();
    } else {
      const t = setInterval(() => setActive(a => a < STEPS.length - 1 ? a + 1 : a), 2800);
      return () => clearInterval(t);
    }
    return () => { if (sub) db.removeChannel(sub); };
  }, [orderNumber]);

  return (
    <div style={{ minHeight: '844px', background: T.trackBg, display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '60px 24px 28px', flexShrink: 0 }}>
        <div style={{ fontSize: 11, color: T.trackSub, letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 8 }}>Mesa {TABLE_NUM} · {orderNumber || 'Ticket en proceso'}</div>
        <div style={{ fontFamily: T.F.h, fontWeight: T.F.hW, fontSize: T.F.heroSz, color: T.trackText, lineHeight: 1.1, marginBottom: 6 }}>Seguimiento</div>
        <div style={{ fontSize: 13, color: T.trackSub }}>Actualización en tiempo real</div>
      </div>
      <div style={{ flex: 1, padding: '0 24px', overflowY: 'auto' }}>
        {STEPS.map((s, i) => {
          const done = i < active, cur = i === active, pend = i > active;
          return <div key={i} style={{ display: 'flex', gap: 16 }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
              <div style={{ width: 30, height: 30, borderRadius: '50%', background: done || cur ? T.trackText : 'rgba(128,128,128,0.1)', border: `2px solid ${done || cur ? T.trackText : 'rgba(128,128,128,0.2)'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'all 400ms' }}>
                {done && <Icon name="check" size={14} color={T.trackBg} sw={3} />}
                {cur && <div style={{ width: 10, height: 10, borderRadius: '50%', background: T.trackBg, animation: 'pulse 1.4s ease infinite' }} />}
              </div>
              {i < STEPS.length - 1 && <div style={{ width: 1, flex: 1, minHeight: 36, background: done ? T.trackLine : T.trackLineDim, margin: '4px 0', transition: 'background 600ms' }} />}
            </div>
            <div style={{ paddingBottom: 28, flex: 1, paddingTop: 4 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: pend ? `${T.trackText}30` : T.trackText, transition: 'color 400ms' }}>{s.label}</div>
              <div style={{ fontSize: 12, color: pend ? `${T.trackSub}50` : T.trackSub, marginTop: 2, transition: 'color 400ms' }}>{s.sub}</div>
            </div>
          </div>;
        })}
      </div>
      {active === STEPS.length - 1 && <div style={{ padding: '16px 24px 40px', animation: 'fadeIn 400ms' }}>
        <button onClick={onRate} style={{ width: '100%', height: 52, background: T.trackText, color: T.trackBg, border: 'none', borderRadius: 14, fontFamily: "'Plus Jakarta Sans',sans-serif", fontSize: 16, fontWeight: 800, cursor: 'pointer' }}>Calificar el servicio</button>
      </div>}
    </div>
  );
}

async function dbLoadOrder(orderNumber) {
  if (!db || !orderNumber) return null;
  try { const { data } = await db.from('orders').select('id,status,order_number').eq('order_number', orderNumber).maybeSingle(); return data; } catch(e) { return null; }
}

      <div style={{ fontSize: 11, fontWeight: 700, color: T.rateSub, letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 8 }}>Comentario o sugerencia</div>
      <textarea value={comment} onChange={e => setComment(e.target.value)} placeholder="¿Qué podemos mejorar?" style={{ flex: 1, minHeight: 110, border: `1px solid ${T.rateInputBorder}`, borderRadius: 12, padding: '12px', fontSize: 13, fontFamily: "'Plus Jakarta Sans',sans-serif", color: T.rateInputText, background: T.rateInput, resize: 'none', outline: 'none', marginBottom: 20 }} />
      <button onClick={handleSubmit} disabled={!rating || submitting} style={{ width: '100%', height: 54, background: rating ? T.rateText : `${T.rateText}12`, color: rating ? T.rateBg : `${T.rateText}30`, border: 'none', borderRadius: 14, fontFamily: "'Plus Jakarta Sans',sans-serif", fontSize: 16, fontWeight: 800, cursor: rating ? 'pointer' : 'default', transition: 'all 250ms', opacity: submitting ? 0.7 : 1 }}>
        {submitting ? 'Enviando…' : 'Enviar calificación'}
      </button>
    </div>
  );
}

/* ══ APP ROOT ════════════════════════════ */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = makeTheme(tweaks.mood, tweaks.tipo, tweaks.carta);

  const [screen, setScreen] = useState('qr');
  const [orderMode, setOrderMode] = useState('eat');
  const [lang, setLang] = useState('es');
  const [selItem, setSelItem] = useState(null);
  const [cartItems, setCartItems] = useState([]);
  const [payTotal, setPayTotal] = useState(0);
  const [paySubtotal, setPaySubtotal] = useState(0);
  const [payDiscount, setPayDiscount] = useState(0);
  const [payCoupon, setPayCoupon] = useState('');
  const [toast, setToast] = useState(null);
  const [liveMenu, setLiveMenu] = useState(null);
  const [currentOrderNum, setCurrentOrderNum] = useState(null);

  useEffect(() => {
    dbLoadMenu().then(menu => { if (menu) setLiveMenu(menu); });
  }, []);

  const showToast = (msg) => setToast(msg);
  const cartCount = cartItems.reduce((s, ci) => s + ci.qty, 0);
  const cartTotal = cartItems.reduce((s, ci) => s + ci.total, 0);

  const addToCart = (item, qty, extras, notes) => {
    const et = extras.reduce((s, e) => s + e.p, 0);
    setCartItems(prev => [...prev, { item, qty, extras, notes, total: (item.price + et) * qty }]);
    showToast('Agregado al pedido');
  };
  const removeItem = (i) => setCartItems(prev => prev.filter((_, idx) => idx !== i));
  const updateQty = (i, d) => setCartItems(prev => prev.map((ci, idx) => {
    if (idx !== i) return ci;
    const nq = ci.qty + d; if (nq <= 0) return null;
    const et = ci.extras.reduce((s, e) => s + e.p, 0);
    return { ...ci, qty: nq, total: (ci.item.price + et) * nq };
  }).filter(Boolean));

  const handleCallWaiter = async () => {
    showToast(`El mozo fue llamado a la mesa ${TABLE_NUM}`);
    await dbCallWaiter(null, null);
  };

  return (
    <ThemeCtx.Provider value={theme}>
      <MenuCtx.Provider value={liveMenu || MENU_STATIC}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', position: 'relative' }}>
          <div className="phone" style={{ background: theme.phoneBg }}>
            <div className="screen">
              <OfflineBanner />
              {toast && <Toast msg={toast} onHide={() => setToast(null)} />}
              {selItem && <ProductModal item={selItem} onClose={() => setSelItem(null)} onAdd={addToCart} />}
              {screen === 'qr' && <QRScreen onScan={() => setScreen('profile')} />}
              {screen === 'profile' && <ProfileScreen onEnter={() => setScreen('menu')} orderMode={orderMode} setOrderMode={setOrderMode} lang={lang} setLang={setLang} onCallWaiter={handleCallWaiter} />}
              {screen === 'menu' && <MenuScreen onItemSelect={setSelItem} cartTotal={cartTotal} cartCount={cartCount} onViewCart={() => setScreen('cart')} onCallWaiter={handleCallWaiter} orderMode={orderMode} />}
              {screen === 'cart' && <CartScreen items={cartItems} onBack={() => setScreen('menu')} onPay={(t, sub, disc, code) => { setPayTotal(t); setPaySubtotal(sub); setPayDiscount(disc); setPayCoupon(code); setScreen('pay'); }} onRemove={removeItem} onQty={updateQty} onCouponApplied={() => {}} />}
              {screen === 'pay' && <PayScreen total={payTotal} subtotal={paySubtotal} discountAmount={payDiscount} couponCode={payCoupon} cartItems={cartItems} orderMode={orderMode} lang={lang} onBack={() => setScreen('cart')} onDone={(ordNum) => { setCurrentOrderNum(ordNum); setScreen('track'); }} />}
              {screen === 'track' && <TrackingScreen onRate={() => setScreen('rate')} orderNumber={currentOrderNum} />}
              {screen === 'rate' && <RatingScreen onDone={() => { setCartItems([]); setCurrentOrderNum(null); setScreen('qr'); }} orderId={null} tableId={null} />}
            </div>
          </div>
          <TweaksPanel>
            <TweakSection title="Ambiente">
              <TweakRadio id="mood" label="Tono de color" value={tweaks.mood} onChange={v => setTweak('mood', v)} options={[{ value: 'negro', label: 'Negro' }, { value: 'blanco', label: 'Blanco' }, { value: 'sepia', label: 'Sépia' }]} />
            </TweakSection>
            <TweakSection title="Tipografía">
              <TweakRadio id="tipo" label="Personalidad" value={tweaks.tipo} onChange={v => setTweak('tipo', v)} options={[{ value: 'editorial', label: 'Editorial' }, { value: 'clasica', label: 'Clásica' }, { value: 'grotesca', label: 'Grotesca' }]} />
            </TweakSection>
            <TweakSection title="Carta">
              <TweakRadio id="carta" label="Vista de productos" value={tweaks.carta} onChange={v => setTweak('carta', v)} options={[{ value: 'clasica', label: 'Clásica' }, { value: 'amplia', label: 'Amplia' }, { value: 'lista', label: 'Lista' }]} />
            </TweakSection>
          </TweaksPanel>
        </div>
      </MenuCtx.Provider>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
