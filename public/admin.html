<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — La Huaca</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:#0A0A0A;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;color:#fff}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#222;border-radius:4px}
  input,textarea,select{font-family:inherit;background:#111;border:1px solid #222;color:#fff;outline:none;border-radius:6px}
  input:focus,textarea:focus,select:focus{border-color:#444}
  button{font-family:inherit;cursor:pointer}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .page{animation:fadeIn .15s ease}
  .spin{animation:spin .8s linear infinite;display:inline-block;width:18px;height:18px;border:2px solid #222;border-top-color:#888;border-radius:50%;vertical-align:middle}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ── DB ── */
const _initDB = () => {
  const cfg = window.SUPABASE_CONFIG;
  if (!cfg?.url || !cfg?.anonKey) return null;
  const url = cfg.url.replace(/^﻿/,'').trim();
  const key = cfg.anonKey.replace(/^﻿/,'').trim();
  if (!url || url.includes('YOUR_') || !key) return null;
  try { return window.supabase.createClient(url, key); } catch(e) { return null; }
};
const db = _initDB();
const RID = ((window.SUPABASE_CONFIG?.restaurantId)||'00000000-0000-0000-0000-000000000001').replace(/^﻿/,'').trim();

/* ── LOCALSTORAGE HELPERS ── */
const LS = {
  get: (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
const ZONES_KEY   = `zones_${RID}`;
const EGRESOS_KEY = `egresos_${RID}`;
const SHIFTS_KEY  = `shifts_${RID}`;
const DELIV_KEY   = `deliv_pct_${RID}`;

/* ── UTILS ── */
const fmt   = n => '₲ ' + (n||0).toLocaleString('es-PY');
const fmtK  = n => n >= 1000000 ? `${(n/1000000).toFixed(1)}M` : n >= 1000 ? `${Math.round(n/1000)}k` : String(n||0);
const fmtDate = d => new Date(d).toLocaleDateString('es-PY',{day:'2-digit',month:'2-digit',year:'2-digit'});
const fmtTime = d => new Date(d).toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit'});
const fmtDT   = d => `${fmtDate(d)} ${fmtTime(d)}`;
const DAY = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const SL = {draft:'Borrador',confirmed:'Confirmado',paid:'Nuevo',kitchen_received:'En cocina',cooking:'Preparando',ready:'Listo',delivered:'Entregado',cancelled:'Cancelado'};
const SC = {draft:'#444',confirmed:'#666',paid:'#f59e0b',kitchen_received:'#3b82f6',cooking:'#f97316',ready:'#22c55e',delivered:'#888',cancelled:'#ef4444'};
const PL = {efectivo:'Efectivo',tarjeta:'Tarjeta',qr:'QR',pos:'POS'};
const EG_CATS = ['Insumos','Personal','Servicios','Alquiler','Mantenimiento','Impuestos','Otro'];
const ROLES = ['cocina','admin','superadmin','waiter'];

/* ── PALETTE ── */
const C = {
  bg:'#0A0A0A',sidebar:'#0D0D0D',surface:'#111',card:'#161616',
  border:'#1a1a1a',bs:'#2a2a2a',
  white:'#fff',ink:'#e8e8e8',mid:'#888',dim:'#444',
  green:'#22c55e',orange:'#f97316',red:'#ef4444',yellow:'#f59e0b',blue:'#3b82f6',purple:'#a855f7',
};

/* ── TOAST ── */
const _toast = { fn: null };
function toast(msg, ok=true) { _toast.fn?.({ msg, ok, id: Date.now() }); }
function ToastContainer() {
  const [items, setItems] = useState([]);
  useEffect(() => {
    _toast.fn = item => {
      setItems(p => [...p.slice(-4), item]);
      setTimeout(() => setItems(p => p.filter(i => i.id !== item.id)), 4000);
    };
    return () => { _toast.fn = null; };
  }, []);
  return (
    <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none'}}>
      {items.map(it => (
        <div key={it.id} style={{background:it.ok?'#0e1e0e':'#1e0e0e',border:`1px solid ${it.ok?'#1a4a1a':'#4a1a1a'}`,color:it.ok?'#4ade80':'#f87171',padding:'10px 16px',fontSize:13,fontWeight:700,borderRadius:8,animation:'slideUp 200ms ease',minWidth:220,maxWidth:320}}>
          {it.ok ? '✓ ' : '✕ '}{it.msg}
        </div>
      ))}
    </div>
  );
}

/* ── MODAL ── */
function Modal({ title, onClose, children, width=420 }) {
  useEffect(() => {
    const fn = e => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [onClose]);
  return (
    <div onClick={e => e.target===e.currentTarget && onClose()} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
      <div style={{background:'#111',border:`1px solid ${C.bs}`,borderRadius:12,padding:28,width:'100%',maxWidth:width,maxHeight:'90vh',overflowY:'auto',animation:'slideUp 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:15,fontWeight:700}}>{title}</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#555',fontSize:22,lineHeight:1,padding:0}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ── SHARED COMPONENTS ── */
function Badge({status}) {
  const col = SC[status]||'#666';
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 8px',fontSize:11,fontWeight:700,background:col+'22',color:col,border:`1px solid ${col}44`,borderRadius:5}}><span style={{width:5,height:5,borderRadius:'50%',background:col}}/>{SL[status]||status}</span>;
}
function KpiCard({label,value,sub,accent,icon}) {
  return (
    <div style={{background:C.surface,border:`1px solid ${C.border}`,padding:'18px 20px',flex:1,minWidth:140,borderRadius:8}}>
      {icon && <div style={{fontSize:20,marginBottom:8}}>{icon}</div>}
      <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>{label}</div>
      <div style={{fontSize:24,fontWeight:800,fontFamily:'JetBrains Mono',color:accent||C.white,lineHeight:1}}>{value}</div>
      {sub && <div style={{fontSize:11,color:'#444',marginTop:5}}>{sub}</div>}
    </div>
  );
}
function Stars({n}) { return <span style={{color:C.yellow,letterSpacing:2,fontSize:14}}>{'★'.repeat(n)}{'☆'.repeat(5-n)}</span>; }
function Th({children,right}) { return <th style={{padding:'9px 14px',textAlign:right?'right':'left',fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,whiteSpace:'nowrap',textTransform:'uppercase'}}>{children}</th>; }
function Td({children,mono,dim,right,style:sx}) { return <td style={{padding:'10px 14px',fontSize:13,fontFamily:mono?'JetBrains Mono':'inherit',color:dim?'#555':'inherit',textAlign:right?'right':'left',...sx}}>{children}</td>; }
function EmptyRow({cols,label}) { return <tr><td colSpan={cols} style={{padding:40,textAlign:'center',color:'#333',fontSize:13}}>{label||'Sin datos'}</td></tr>; }
function Lbl({children}) { return <label style={{fontSize:10,color:'#555',display:'block',marginBottom:5,fontWeight:700,letterSpacing:1}}>{children}</label>; }
function Inp({value,onChange,placeholder,type='text',mono,full=true,...rest}) {
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder} {...rest} style={{width:full?'100%':'auto',padding:'8px 10px',fontSize:13,fontFamily:mono?'JetBrains Mono':'inherit',borderRadius:6,...(rest.style||{})}}/>;
}
function Sel({value,onChange,children,...rest}) {
  return <select value={value} onChange={onChange} {...rest} style={{width:'100%',padding:'8px 10px',fontSize:13,borderRadius:6,...(rest.style||{})}}>{children}</select>;
}
function Btn({children,onClick,variant='primary',disabled,small,style:sx}) {
  const bg = variant==='primary'?C.white:variant==='danger'?'rgba(239,68,68,0.1)':variant==='ghost'?'transparent':'rgba(255,255,255,0.06)';
  const color = variant==='primary'?'#000':variant==='danger'?C.red:C.mid;
  const border = variant==='primary'?'none':variant==='danger'?'1px solid rgba(239,68,68,0.3)':`1px solid ${C.border}`;
  return (
    <button onClick={onClick} disabled={disabled} style={{background:bg,border,color,padding:small?'5px 10px':'9px 18px',fontSize:small?11:13,fontWeight:700,borderRadius:6,opacity:disabled?0.5:1,...sx}}>
      {children}
    </button>
  );
}
function Divider() { return <div style={{height:1,background:C.border,margin:'4px 0'}}/> }

/* ── SIDEBAR ── */
const NAV = [
  {id:'dashboard', label:'Dashboard',   icon:'◆'},
  {id:'pedidos',   label:'Pedidos',      icon:'≡'},
  null,
  {id:'menu',      label:'Menú',         icon:'⊞', group:'GESTIÓN'},
  {id:'mesas',     label:'Mesas',        icon:'⊡'},
  {id:'personal',  label:'Personal',     icon:'◎'},
  null,
  {id:'clientes',  label:'Clientes',     icon:'♦', group:'ANÁLISIS'},
  {id:'finanzas',  label:'Finanzas',     icon:'₲'},
  null,
  {id:'marketing', label:'Marketing',    icon:'%', group:'ACCIONES'},
  {id:'ratings',   label:'Calificaciones',icon:'★'},
  null,
  {id:'config',    label:'Config',       icon:'⚙', group:'SISTEMA'},
];

function Sidebar({page,setPage,restaurant,dbOk}) {
  return (
    <aside style={{width:200,minHeight:'100vh',background:C.sidebar,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh',overflowY:'auto',flexShrink:0}}>
      <div style={{padding:'18px 16px 14px',borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontFamily:'DM Serif Display',fontSize:16,color:C.white}}>{restaurant?.name||'La Huaca'}</div>
        <div style={{fontSize:10,color:'#333',marginTop:2}}>Panel Admin</div>
        <div style={{display:'flex',alignItems:'center',gap:6,marginTop:8}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:dbOk?C.green:C.red,flexShrink:0}}/>
          <span style={{fontSize:10,color:dbOk?'#444':C.red,fontWeight:600}}>{dbOk?'Supabase OK':'Sin DB'}</span>
        </div>
      </div>
      <nav style={{padding:'6px 0',flex:1}}>
        {NAV.map((n,i) => {
          if (!n) return <Divider key={i}/>;
          const active = page === n.id;
          return (
            <div key={n.id}>
              {n.group && <div style={{padding:'8px 16px 3px',fontSize:9,color:'#333',fontWeight:800,letterSpacing:'0.14em',textTransform:'uppercase'}}>{n.group}</div>}
              <button onClick={() => setPage(n.id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 16px',background:active?'rgba(255,255,255,0.08)':'none',border:'none',color:active?C.white:C.dim,textAlign:'left',fontSize:13,fontWeight:active?700:400,cursor:'pointer',borderLeft:active?`2px solid ${C.white}`:'2px solid transparent'}}>
                <span style={{fontSize:12,width:14,textAlign:'center',flexShrink:0,fontFamily:'monospace'}}>{n.icon}</span>
                {n.label}
              </button>
            </div>
          );
        })}
      </nav>
      <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`}}>
        <a href="cocina.html" style={{display:'block',color:'#333',fontSize:11,textDecoration:'none',padding:'4px 0'}}>→ Cocina (KDS)</a>
        <a href="index.html"  style={{display:'block',color:'#333',fontSize:11,textDecoration:'none',padding:'4px 0'}}>→ App Cliente</a>
        {db && <button onClick={async()=>{await db.auth.signOut();window.location.replace('login.html');}} style={{marginTop:8,background:'none',border:`1px solid ${C.border}`,color:'#333',fontSize:11,padding:'4px 10px',borderRadius:5,width:'100%'}}>Salir</button>}
      </div>
    </aside>
  );
}

/* ══════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════ */
function DashboardPage({orders,ratings}) {
  const today = new Date().toDateString();
  const thisWeekStart = new Date(); thisWeekStart.setDate(thisWeekStart.getDate()-6); thisWeekStart.setHours(0,0,0,0);
  const valid = o => !['draft','cancelled'].includes(o.status);
  const todayOrds  = orders.filter(o => new Date(o.created_at).toDateString()===today && valid(o));
  const weekOrds   = orders.filter(o => new Date(o.created_at)>=thisWeekStart && valid(o));
  const active     = orders.filter(o => ['paid','kitchen_received','cooking','ready'].includes(o.status));
  const cancelled  = orders.filter(o => o.status==='cancelled');
  const avgTicket  = weekOrds.length ? Math.round(weekOrds.reduce((s,o)=>s+(o.total||0),0)/weekOrds.length) : 0;
  const avgRating  = ratings.length ? (ratings.reduce((s,r)=>s+r.stars,0)/ratings.length).toFixed(1) : '—';
  const cancelRate = orders.length ? Math.round(cancelled.length/orders.length*100) : 0;

  // Últimos 7 días
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-6+i);
    const ds = d.toDateString();
    const dayOrds = orders.filter(o=>new Date(o.created_at).toDateString()===ds && valid(o));
    return {label:DAY[d.getDay()],rev:dayOrds.reduce((s,o)=>s+(o.total||0),0),cnt:dayOrds.length,isToday:i===6};
  });
  const maxRev = Math.max(...last7.map(d=>d.rev),1);

  // Horas pico — un solo recorrido en lugar de 24 filter calls
  const hourly = Array(24).fill(0);
  orders.filter(valid).forEach(o => { hourly[new Date(o.created_at).getHours()]++; });
  const maxHour = Math.max(...hourly,1);

  // Top items from orders (approximate via items_count per order is not enough — use preloaded top if available)
  const recent = orders.slice(0,10);

  return (
    <div className="page">
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:22,fontWeight:800}}>Dashboard</h1>
        <div style={{fontSize:12,color:'#555',marginTop:3}}>{new Date().toLocaleDateString('es-PY',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
      </div>

      {/* KPIs fila 1 */}
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <KpiCard label="Ventas hoy"     value={fmt(todayOrds.reduce((s,o)=>s+(o.total||0),0))} sub={`${todayOrds.length} pedidos`} accent={C.green}/>
        <KpiCard label="Ventas semana"  value={fmt(weekOrds.reduce((s,o)=>s+(o.total||0),0))} sub={`${weekOrds.length} pedidos`}/>
        <KpiCard label="Ticket promedio" value={fmt(avgTicket)} sub="últimos 7 días"/>
        <KpiCard label="Activos ahora"  value={active.length} accent={active.length>0?C.orange:C.mid} sub="en cocina o listos"/>
        <KpiCard label="Cancelaciones"  value={`${cancelRate}%`} sub={`${cancelled.length} pedidos`} accent={cancelRate>10?C.red:C.mid}/>
        <KpiCard label="Rating"         value={avgRating} sub={`${ratings.length} reseñas`} accent={C.yellow}/>
      </div>

      {/* Charts row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        {/* Ingresos 7 días */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:20}}>
          <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:16}}>INGRESOS — ÚLTIMOS 7 DÍAS</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:8,height:100}}>
            {last7.map((d,i) => (
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
                <div style={{fontSize:9,color:'#444',fontFamily:'JetBrains Mono',textAlign:'center',minHeight:12}}>{d.rev>0?fmtK(d.rev):''}</div>
                <div style={{width:'100%',height:`${Math.max(d.rev>0?Math.round((d.rev/maxRev)*80):0,d.rev>0?3:0)}px`,background:d.isToday?'#fff':'#2a2a2a',borderRadius:'3px 3px 0 0',transition:'height .3s',minHeight:d.rev>0?3:0}}/>
                <div style={{fontSize:10,color:d.isToday?C.white:'#444',fontWeight:d.isToday?700:400}}>{d.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Horas pico */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:20}}>
          <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:16}}>HORAS PICO</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:2,height:80}}>
            {hourly.map((n,h) => {
              const isNow = new Date().getHours()===h;
              const isPeak = n === maxHour && n > 0;
              return (
                <div key={h} title={`${h}:00 — ${n} pedidos`} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <div style={{width:'100%',height:`${Math.max(n>0?Math.round((n/maxHour)*68):0,n>0?2:0)}px`,background:isPeak?C.yellow:isNow?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.12)',borderRadius:'2px 2px 0 0',transition:'height .3s'}}/>
                  {h%4===0 && <div style={{fontSize:8,color:'#333',fontFamily:'JetBrains Mono'}}>{h}</div>}
                </div>
              );
            })}
          </div>
          <div style={{fontSize:10,color:'#444',marginTop:8}}>
            {maxHour>0 ? `Pico: ${hourly.indexOf(maxHour)}:00 (${maxHour} pedidos)` : 'Sin datos suficientes'}
          </div>
        </div>
      </div>

      {/* Métodos de pago + Pedidos recientes */}
      <div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:14}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:18}}>
          <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:14}}>MÉTODOS DE PAGO</div>
          {Object.entries(orders.filter(o=>valid(o)&&o.payment_method).reduce((acc,o)=>{acc[o.payment_method]=(acc[o.payment_method]||0)+1;return acc;},{})).sort((a,b)=>b[1]-a[1]).map(([m,n])=>(
            <div key={m} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
              <span style={{fontSize:12,color:C.mid}}>{PL[m]||m}</span>
              <span style={{fontFamily:'JetBrains Mono',fontSize:13,fontWeight:700}}>{n}</span>
            </div>
          ))}
          {orders.filter(o=>valid(o)&&o.payment_method).length===0 && <div style={{color:'#333',fontSize:12}}>Sin datos</div>}
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
          <div style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,fontSize:10,fontWeight:700,color:'#555',letterSpacing:1}}>PEDIDOS RECIENTES</div>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><Th>#</Th><Th>Mesa</Th><Th>Estado</Th><Th right>Total</Th><Th>Pago</Th><Th>Hora</Th></tr></thead>
            <tbody>
              {recent.map(o=>(
                <tr key={o.id} style={{borderBottom:`1px solid #0d0d0d`}}>
                  <Td mono dim>{o.order_number}</Td>
                  <Td>{o.order_type==='llevar'?'Llevar':`Mesa ${o.table_number||'?'}`}</Td>
                  <Td><Badge status={o.status}/></Td>
                  <Td mono right>{fmt(o.total)}</Td>
                  <Td dim>{PL[o.payment_method]||'—'}</Td>
                  <Td mono dim>{fmtTime(o.created_at)}</Td>
                </tr>
              ))}
              {recent.length===0 && <EmptyRow cols={6} label="No hay pedidos"/>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   PEDIDOS
══════════════════════════════════════════════ */
function PedidosPage({orders,onRefresh}) {
  const [filter,setFilter] = useState('all');
  const [selected,setSelected] = useState(null);
  const [items,setItems] = useState([]);
  const [loadingItems,setLoadingItems] = useState(false);
  const [upd,setUpd] = useState(false);
  const FILTERS = [{id:'all',label:'Todos'},{id:'active',label:'Activos'},{id:'paid',label:'Nuevos'},{id:'cooking',label:'Preparando'},{id:'delivered',label:'Entregados'},{id:'cancelled',label:'Cancelados'}];
  const filtered = useMemo(()=>{
    if(filter==='all') return orders;
    if(filter==='active') return orders.filter(o=>['paid','kitchen_received','cooking','ready'].includes(o.status));
    if(filter==='paid') return orders.filter(o=>['paid','kitchen_received'].includes(o.status));
    return orders.filter(o=>o.status===filter);
  },[orders,filter]);

  async function selectOrder(o) {
    setSelected(o);setItems([]);
    if(!db)return;
    setLoadingItems(true);
    const{data}=await db.from('order_items').select('item_name,quantity,unit_price,total_price,observations').eq('order_id',o.id);
    setItems(data||[]);setLoadingItems(false);
  }
  async function updateStatus(orderId,newStatus) {
    if(!db)return;setUpd(true);
    const{error}=await db.from('orders').update({status:newStatus,...(newStatus==='delivered'?{completed_at:new Date().toISOString()}:{})}).eq('id',orderId);
    if(error){toast('Error: '+error.message,false);}else{toast('Estado actualizado');setSelected(s=>s?.id===orderId?{...s,status:newStatus}:s);onRefresh();}
    setUpd(false);
  }
  return (
    <div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h1 style={{fontSize:22,fontWeight:800}}>Pedidos</h1>
        <Btn onClick={onRefresh} variant="secondary">↺ Actualizar</Btn>
      </div>
      <div style={{display:'flex',gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:0}}>
        {FILTERS.map(f=>(
          <button key={f.id} onClick={()=>setFilter(f.id)} style={{background:'none',border:'none',color:filter===f.id?C.white:'#444',padding:'8px 13px',fontSize:12,fontWeight:filter===f.id?700:400,borderBottom:filter===f.id?'2px solid #fff':'2px solid transparent',cursor:'pointer',marginBottom:-1}}>
            {f.label} {f.id!=='all'&&<span style={{color:'#555',fontSize:10}}>({filtered.length})</span>}
          </button>
        ))}
      </div>
      <div style={{display:'flex',gap:12,paddingTop:12,minHeight:400}}>
        <div style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><Th>#</Th><Th>Mesa</Th><Th>Estado</Th><Th>Items</Th><Th right>Total</Th><Th>Pago</Th><Th>Fecha</Th></tr></thead>
            <tbody>
              {filtered.map(o=>(
                <tr key={o.id} onClick={()=>selectOrder(o)} style={{borderBottom:`1px solid #0d0d0d`,cursor:'pointer',background:selected?.id===o.id?'#1a1a1a':'transparent'}}>
                  <Td mono dim>{o.order_number}</Td>
                  <Td>{o.order_type==='llevar'?'Llevar':`Mesa ${o.table_number||'?'}`}</Td>
                  <Td><Badge status={o.status}/></Td>
                  <Td dim>{o.items_count||0}</Td>
                  <Td mono right>{fmt(o.total)}</Td>
                  <Td dim>{PL[o.payment_method]||'—'}</Td>
                  <Td mono dim>{fmtDT(o.created_at)}</Td>
                </tr>
              ))}
              {filtered.length===0&&<EmptyRow cols={7} label="Sin pedidos"/>}
            </tbody>
          </table>
        </div>
        {selected&&(
          <div style={{width:280,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,flexShrink:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{padding:'13px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between'}}>
              <div><div style={{fontFamily:'JetBrains Mono',fontSize:14,fontWeight:700}}>{selected.order_number}</div><div style={{fontSize:10,color:'#444',marginTop:2}}>{fmtDT(selected.created_at)}</div></div>
              <button onClick={()=>{setSelected(null);setItems([]);}} style={{background:'none',border:'none',color:'#444',fontSize:20,lineHeight:1,padding:0}}>×</button>
            </div>
            <div style={{padding:'8px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
              <Badge status={selected.status}/>
              <span style={{fontSize:12,color:'#555'}}>{selected.order_type==='llevar'?'Llevar':`Mesa ${selected.table_number||'?'}`}</span>
            </div>
            <div style={{flex:1,padding:'8px 16px',overflowY:'auto',borderBottom:`1px solid ${C.border}`}}>
              {loadingItems&&<span className="spin"/>}
              {items.map((it,i)=>(
                <div key={i} style={{borderBottom:`1px solid #0d0d0d`,padding:'6px 0'}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span>{it.quantity}× {it.item_name}</span><span style={{fontFamily:'JetBrains Mono',color:'#666',marginLeft:6}}>{fmt(it.total_price)}</span></div>
                  {it.observations&&<div style={{fontSize:11,color:'#555',marginTop:2}}>→ {it.observations}</div>}
                </div>
              ))}
            </div>
            <div style={{padding:'8px 16px',borderBottom:`1px solid ${C.border}`}}>
              {selected.discount_amount>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4,color:C.green}}><span>Descuento</span><span style={{fontFamily:'JetBrains Mono'}}>-{fmt(selected.discount_amount)}</span></div>}
              <div style={{display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:14}}><span>Total</span><span style={{fontFamily:'JetBrains Mono'}}>{fmt(selected.total)}</span></div>
            </div>
            <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:7}}>
              {selected.status==='paid'&&<Btn onClick={()=>updateStatus(selected.id,'cooking')} disabled={upd}>→ Iniciar preparación</Btn>}
              {selected.status==='cooking'&&<Btn onClick={()=>updateStatus(selected.id,'ready')} disabled={upd}>✓ Marcar listo</Btn>}
              {selected.status==='ready'&&<Btn onClick={()=>updateStatus(selected.id,'delivered')} disabled={upd}>✓ Entregar</Btn>}
              {!['delivered','cancelled'].includes(selected.status)&&<Btn variant="danger" onClick={()=>{if(confirm(`¿Cancelar ${selected.order_number}?`))updateStatus(selected.id,'cancelled');}} disabled={upd}>✕ Cancelar</Btn>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   MENÚ
══════════════════════════════════════════════ */
function MenuPage({categories,menuItems,onRefresh}) {
  const [catFilter,setCatFilter] = useState('all');
  const [showForm,setShowForm] = useState(false);
  const [editId,setEditId] = useState(null);
  const [editVals,setEditVals] = useState({});
  const [saving,setSaving] = useState(false);
  const [newCat,setNewCat] = useState('');
  const [form,setForm] = useState({name:'',description:'',price_guarani:'',category_id:'',is_available:true,promo_tag:'',image_url:''});
  const visible = catFilter==='all'?menuItems:menuItems.filter(i=>i.category_id===catFilter);
  const catName = id => categories.find(c=>c.id===id)?.name||'—';

  async function addCategory() {
    if(!db||!newCat.trim())return;
    const{error}=await db.from('menu_categories').insert({restaurant_id:RID,name:newCat.trim(),sort_order:categories.length+1});
    error?toast('Error: '+error.message,false):(toast('Categoría agregada'),setNewCat(''),onRefresh());
  }
  async function addItem() {
    if(!db||!form.name||!form.price_guarani||!form.category_id){toast('Completá nombre, precio y categoría',false);return;}
    setSaving(true);
    const{error}=await db.from('menu_items').insert({name:form.name,description:form.description||null,price_guarani:parseInt(form.price_guarani),category_id:form.category_id,restaurant_id:RID,is_available:form.is_available,promo_tag:form.promo_tag||null,image_url:form.image_url||null});
    if(error){toast('Error al guardar: '+error.message,false);}else{toast('Item creado — visible en app cliente al refrescar');setShowForm(false);setForm({name:'',description:'',price_guarani:'',category_id:'',is_available:true,promo_tag:'',image_url:''});onRefresh();}
    setSaving(false);
  }
  async function toggleAvail(item) {
    if(!db)return;
    const{error}=await db.from('menu_items').update({is_available:!item.is_available}).eq('id',item.id);
    error?toast('Error: '+error.message,false):(toast(item.is_available?'Desactivado — no aparece en carta':'Activado — visible en carta'),onRefresh());
  }
  async function saveEdit(item) {
    if(!db)return;
    const v=editVals[item.id]||{};
    const upd={};
    if(v.name!==undefined&&v.name!==item.name)upd.name=v.name;
    if(v.desc!==undefined&&v.desc!==(item.description||''))upd.description=v.desc||null;
    if(v.price!==undefined&&parseInt(v.price)!==item.price_guarani)upd.price_guarani=parseInt(v.price);
    if(v.promo!==undefined&&v.promo!==(item.promo_tag||''))upd.promo_tag=v.promo||null;
    if(v.img!==undefined&&v.img!==(item.image_url||''))upd.image_url=v.img||null;
    if(!Object.keys(upd).length){setEditId(null);return;}
    const{error}=await db.from('menu_items').update(upd).eq('id',item.id);
    error?toast('Error: '+error.message,false):(toast('Guardado — se refleja en la app al refrescar'),setEditId(null),onRefresh());
  }
  async function deleteItem(item) {
    if(!db||!confirm(`¿Eliminar "${item.name}"?`))return;
    const{error}=await db.from('menu_items').delete().eq('id',item.id);
    error?toast('Error: '+error.message,false):(toast('Item eliminado'),onRefresh());
  }
  function startEdit(item){setEditId(item.id);setEditVals(v=>({...v,[item.id]:{name:item.name,desc:item.description||'',price:item.price_guarani,promo:item.promo_tag||'',img:item.image_url||''}}));}
  function upd(id,k,v){setEditVals(ev=>({...ev,[id]:{...ev[id],[k]:v}}));}

  return (
    <div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h1 style={{fontSize:22,fontWeight:800}}>Menú</h1>
        <div style={{display:'flex',gap:8}}>
          <a href="index.html" target="_blank" style={{fontSize:12,color:'#555',padding:'8px 12px',border:`1px solid ${C.border}`,borderRadius:6,textDecoration:'none'}}>Ver app →</a>
          <Btn onClick={()=>setShowForm(!showForm)}>+ Nuevo item</Btn>
        </div>
      </div>
      <div style={{background:'rgba(251,191,36,0.06)',border:'1px solid rgba(251,191,36,0.2)',borderRadius:8,padding:'9px 14px',marginBottom:14,fontSize:12,color:'#888'}}>
        Los cambios se guardan en Supabase. La app del cliente los ve al refrescar. Si no funcionan, revisá los permisos RLS en Supabase Dashboard.
      </div>
      <div style={{display:'flex',gap:14}}>
        <div style={{width:165,flexShrink:0}}>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,marginBottom:10,overflow:'hidden'}}>
            <div style={{padding:'8px 12px',fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,borderBottom:`1px solid ${C.border}`}}>CATEGORÍAS</div>
            {[{id:'all',name:'Todas',cnt:menuItems.length},...categories.map(c=>({id:c.id,name:c.name,cnt:menuItems.filter(i=>i.category_id===c.id).length}))].map(c=>{
              const active=catFilter===c.id;
              return <button key={c.id} onClick={()=>setCatFilter(c.id)} style={{display:'flex',justifyContent:'space-between',width:'100%',textAlign:'left',padding:'8px 12px',background:active?'rgba(255,255,255,0.08)':'none',border:'none',color:active?C.white:C.mid,fontSize:13,cursor:'pointer',borderBottom:`1px solid #0d0d0d`,borderLeft:active?`2px solid ${C.white}`:'2px solid transparent'}}>
                <span>{c.name}</span><span style={{color:'#333',fontSize:11}}>{c.cnt}</span>
              </button>;
            })}
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:12}}>
            <div style={{fontSize:10,color:'#555',fontWeight:700,marginBottom:7}}>+ CATEGORÍA</div>
            <Inp value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Nombre…" onKeyDown={e=>e.key==='Enter'&&addCategory()}/>
            <Btn variant="secondary" onClick={addCategory} style={{marginTop:7,width:'100%'}} small disabled={!newCat.trim()}>Agregar</Btn>
          </div>
        </div>
        <div style={{flex:1}}>
          {showForm&&(
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:20,marginBottom:12}}>
              <div style={{fontSize:11,color:'#555',fontWeight:700,marginBottom:14,letterSpacing:1}}>NUEVO ITEM</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <div><Lbl>NOMBRE *</Lbl><Inp value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Lomito completo"/></div>
                <div><Lbl>PRECIO (₲) *</Lbl><Inp type="number" mono value={form.price_guarani} onChange={e=>setForm({...form,price_guarani:e.target.value})} placeholder="75000"/></div>
                <div><Lbl>CATEGORÍA *</Lbl><Sel value={form.category_id} onChange={e=>setForm({...form,category_id:e.target.value})}><option value="">Seleccionar…</option>{categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</Sel></div>
                <div><Lbl>PROMO TAG</Lbl><Inp value={form.promo_tag} onChange={e=>setForm({...form,promo_tag:e.target.value})} placeholder="2×1, Nuevo, Chef ★"/></div>
                <div style={{gridColumn:'1/-1'}}><Lbl>URL DE IMAGEN (pegar link de foto)</Lbl><Inp value={form.image_url} onChange={e=>setForm({...form,image_url:e.target.value})} placeholder="https://i.imgur.com/ejemplo.jpg"/></div>
                {form.image_url&&<div style={{gridColumn:'1/-1',height:80,borderRadius:6,overflow:'hidden'}}><img src={form.image_url} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.style.display='none';}}/></div>}
                <div style={{gridColumn:'1/-1'}}><Lbl>DESCRIPCIÓN</Lbl><textarea value={form.description||''} onChange={e=>setForm({...form,description:e.target.value})} rows={2} style={{width:'100%',padding:'8px 10px',fontSize:13,resize:'vertical',background:'#111',border:'1px solid #222',color:'#fff',borderRadius:6}}/></div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <Btn onClick={addItem} disabled={saving}>{saving?'Guardando…':'Guardar item'}</Btn>
                <Btn variant="ghost" onClick={()=>setShowForm(false)}>Cancelar</Btn>
              </div>
            </div>
          )}
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><Th>Foto</Th><Th>Nombre</Th><Th>Cat.</Th><Th right>Precio</Th><Th>Promo</Th><Th>Estado</Th><Th>Acc.</Th></tr></thead>
              <tbody>
                {visible.map(item=>{
                  const ed=editId===item.id;const ev=editVals[item.id]||{};
                  return (
                    <tr key={item.id} style={{borderBottom:`1px solid #0d0d0d`}}>
                      <Td>
                        {ed?<Inp value={ev.img||''} onChange={e=>upd(item.id,'img',e.target.value)} placeholder="https://…" style={{width:120,fontSize:11}}/>
                          :item.image_url?<img src={item.image_url} alt="" style={{width:36,height:36,objectFit:'cover',borderRadius:4}} onError={e=>{e.target.style.display='none';}}/>
                          :<div style={{width:36,height:36,background:'#1a1a1a',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🍽</div>}
                      </Td>
                      <Td>
                        {ed?<div style={{display:'flex',flexDirection:'column',gap:4}}>
                            <Inp value={ev.name||''} onChange={e=>upd(item.id,'name',e.target.value)} placeholder="Nombre" style={{fontSize:13}}/>
                            <Inp value={ev.desc||''} onChange={e=>upd(item.id,'desc',e.target.value)} placeholder="Descripción" style={{fontSize:11,color:'#777'}}/>
                          </div>
                          :<div><div style={{color:item.is_available?C.ink:'#444'}}>{item.name}</div>{item.description&&<div style={{fontSize:11,color:'#444',marginTop:2,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.description}</div>}</div>}
                      </Td>
                      <Td dim>{catName(item.category_id)}</Td>
                      <Td mono right>
                        {ed?<Inp type="number" mono value={ev.price||''} onChange={e=>upd(item.id,'price',e.target.value)} style={{width:100,textAlign:'right'}}/>:fmt(item.price_guarani)}
                      </Td>
                      <Td>
                        {ed?<Inp value={ev.promo||''} onChange={e=>upd(item.id,'promo',e.target.value)} placeholder="promo…" style={{width:80,fontSize:11}}/>
                          :item.promo_tag&&<span style={{background:'#1a1400',border:'1px solid #3a2a00',color:C.yellow,padding:'2px 6px',fontSize:11,borderRadius:4}}>{item.promo_tag}</span>}
                      </Td>
                      <Td>
                        <button onClick={()=>toggleAvail(item)} style={{background:item.is_available?'rgba(34,197,94,0.1)':'rgba(255,255,255,0.04)',border:`1px solid ${item.is_available?'rgba(34,197,94,0.3)':C.border}`,color:item.is_available?C.green:'#444',padding:'3px 9px',fontSize:11,fontWeight:600,borderRadius:5}}>
                          {item.is_available?'Activo':'Inactivo'}
                        </button>
                      </Td>
                      <Td>
                        {ed?<div style={{display:'flex',gap:5}}>
                            <Btn small onClick={()=>saveEdit(item)}>✓</Btn>
                            <Btn small variant="ghost" onClick={()=>setEditId(null)}>✕</Btn>
                          </div>
                          :<div style={{display:'flex',gap:5}}>
                            <Btn small variant="secondary" onClick={()=>startEdit(item)}>Editar</Btn>
                            <Btn small variant="danger" onClick={()=>deleteItem(item)}>✕</Btn>
                          </div>}
                      </Td>
                    </tr>
                  );
                })}
                {visible.length===0&&<EmptyRow cols={7} label="Sin items"/>}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   MESAS — CRUD COMPLETO + ZONAS
══════════════════════════════════════════════ */
function MesasPage({tables,orders,onRefresh}) {
  const [zones,setZones] = useState(()=>LS.get(ZONES_KEY,{}));
  const [modal,setModal] = useState(null); // null | {mode:'add'} | {mode:'edit', table}
  const [form,setForm] = useState({number:'',capacity:'4',zone:''});
  const [saving,setSaving] = useState(false);
  const [activeZone,setActiveZone] = useState('todas');

  const activeOrders = orders.filter(o=>['paid','kitchen_received','cooking','ready'].includes(o.status));
  const allZones = [...new Set(Object.values(zones).filter(Boolean))].sort();

  function saveZone(tableId,zone) {
    const z={...zones};
    if(zone.trim())z[tableId]=zone.trim();else delete z[tableId];
    setZones(z);LS.set(ZONES_KEY,z);
  }

  function openAdd() { setForm({number:'',capacity:'4',zone:''});setModal({mode:'add'}); }
  function openEdit(t) { setForm({number:String(t.number),capacity:String(t.capacity||4),zone:zones[t.id]||''});setModal({mode:'edit',table:t}); }

  async function saveTable() {
    if(!db||!form.number){toast('Número de mesa requerido',false);return;}
    const num=parseInt(form.number);
    if(isNaN(num)||num<1){toast('Número inválido',false);return;}
    setSaving(true);
    if(modal.mode==='add') {
      const token=(crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)).replace(/-/g,'').slice(0,16);
      const{data,error}=await db.from('tables').insert({restaurant_id:RID,number:num,capacity:parseInt(form.capacity)||4,qr_token:token}).select().single();
      if(error){toast('Error: '+error.message,false);}
      else{saveZone(data.id,form.zone);toast('Mesa '+num+' creada');onRefresh();setModal(null);}
    } else {
      const{error}=await db.from('tables').update({number:num,capacity:parseInt(form.capacity)||4}).eq('id',modal.table.id);
      if(error){toast('Error: '+error.message,false);}
      else{saveZone(modal.table.id,form.zone);toast('Mesa actualizada');onRefresh();setModal(null);}
    }
    setSaving(false);
  }

  async function deleteTable(t) {
    if(!db)return;
    const hasActive=activeOrders.some(o=>o.table_id===t.id);
    if(hasActive){toast('Mesa con pedido activo, no se puede eliminar',false);return;}
    if(!confirm(`¿Eliminar Mesa ${t.number}? Esta acción no se puede deshacer.`))return;
    const{error}=await db.from('tables').delete().eq('id',t.id);
    if(error){toast('Error: '+error.message,false);}
    else{const z={...zones};delete z[t.id];setZones(z);LS.set(ZONES_KEY,z);toast('Mesa eliminada');onRefresh();}
  }

  const filtered = activeZone==='todas' ? tables : activeZone==='sin zona' ? tables.filter(t=>!zones[t.id]) : tables.filter(t=>zones[t.id]===activeZone);
  const grouped = activeZone!=='todas' ? [{zone:activeZone,items:filtered}] :
    [...allZones.map(z=>({zone:z,items:tables.filter(t=>zones[t.id]===z)})),
     {zone:'Sin zona',items:tables.filter(t=>!zones[t.id])}].filter(g=>g.items.length>0);

  return (
    <div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800}}>Mesas</h1>
          <div style={{fontSize:12,color:'#555',marginTop:2}}>{activeOrders.length} con pedidos activos · {tables.length} mesas</div>
        </div>
        <Btn onClick={openAdd}>+ Nueva mesa</Btn>
      </div>

      {/* Filtro zonas */}
      <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
        {['todas',...allZones,'sin zona'].map(z=>(
          <button key={z} onClick={()=>setActiveZone(z)} style={{background:activeZone===z?'rgba(255,255,255,0.1)':'transparent',border:`1px solid ${activeZone===z?C.bs:C.border}`,color:activeZone===z?C.white:C.mid,padding:'5px 12px',fontSize:12,fontWeight:activeZone===z?700:400,borderRadius:20,cursor:'pointer',textTransform:'capitalize'}}>
            {z}
          </button>
        ))}
      </div>

      {/* Grupos por zona */}
      {grouped.map(({zone,items})=>(
        <div key={zone} style={{marginBottom:24}}>
          {grouped.length>1&&<div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>{zone}<div style={{flex:1,height:1,background:C.border}}/></div>}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(175px,1fr))',gap:10}}>
            {items.map(t=>{
              const order=activeOrders.find(o=>o.table_id===t.id);
              const busy=!!order;
              return (
                <div key={t.id} style={{background:busy?C.surface:'#0d0d0d',border:`1px solid ${busy?C.bs:C.border}`,borderRadius:10,padding:16,position:'relative'}}>
                  {busy&&<div style={{position:'absolute',top:10,right:10}}><Badge status={order.status}/></div>}
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <div style={{width:36,height:36,borderRadius:'50%',background:busy?C.white:'#1a1a1a',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:15,color:busy?'#000':'#333',flexShrink:0}}>{t.number}</div>
                    <div>
                      <div style={{fontSize:11,color:'#555'}}>Cap. {t.capacity||4}p</div>
                      {zones[t.id]&&<div style={{fontSize:10,color:'#444',marginTop:1}}>{zones[t.id]}</div>}
                    </div>
                  </div>
                  {order
                    ?<div><div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888',marginBottom:2}}>{order.order_number}</div><div style={{fontSize:14,fontWeight:700}}>{fmt(order.total)}</div><div style={{fontSize:10,color:'#555',marginTop:1}}>{fmtTime(order.created_at)}</div></div>
                    :<div style={{fontSize:12,color:'#2a2a2a'}}>Libre</div>}
                  <div style={{display:'flex',gap:6,marginTop:12}}>
                    <button onClick={()=>openEdit(t)} style={{flex:1,background:'transparent',border:`1px solid ${C.border}`,color:C.dim,padding:'4px',fontSize:11,borderRadius:5,cursor:'pointer'}}>Editar</button>
                    <button onClick={()=>deleteTable(t)} style={{background:'transparent',border:'1px solid rgba(239,68,68,0.2)',color:'rgba(239,68,68,0.6)',padding:'4px 8px',fontSize:11,borderRadius:5,cursor:'pointer'}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      {tables.length===0&&<div style={{color:'#333',padding:40,textAlign:'center',fontSize:13}}>No hay mesas. Creá la primera con "+ Nueva mesa"</div>}

      {/* Modal add/edit */}
      {modal&&(
        <Modal title={modal.mode==='add'?'Nueva mesa':'Editar mesa'} onClose={()=>setModal(null)} width={360}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div><Lbl>NÚMERO *</Lbl><Inp type="number" mono value={form.number} onChange={e=>setForm({...form,number:e.target.value})} placeholder="1"/></div>
              <div><Lbl>CAPACIDAD</Lbl><Inp type="number" mono value={form.capacity} onChange={e=>setForm({...form,capacity:e.target.value})} placeholder="4"/></div>
            </div>
            <div>
              <Lbl>ZONA</Lbl>
              <input list="zonas-list" value={form.zone} onChange={e=>setForm({...form,zone:e.target.value})} placeholder="Salón, Terraza, Barra…" style={{width:'100%',padding:'8px 10px',fontSize:13,borderRadius:6,background:'#111',border:'1px solid #222',color:'#fff'}}/>
              <datalist id="zonas-list">{allZones.map(z=><option key={z} value={z}/>)}</datalist>
              <div style={{fontSize:10,color:'#444',marginTop:4}}>Las zonas se guardan en este navegador (no en DB)</div>
            </div>
            {modal.mode==='edit'&&modal.table.qr_token&&(
              <div style={{background:'#0a0a0a',border:`1px solid ${C.border}`,borderRadius:6,padding:10}}>
                <div style={{fontSize:10,color:'#555',fontWeight:700,marginBottom:4}}>TOKEN QR</div>
                <div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#444',wordBreak:'break-all'}}>{modal.table.qr_token}</div>
              </div>
            )}
            <div style={{display:'flex',gap:8,marginTop:4}}>
              <Btn onClick={saveTable} disabled={saving}>{saving?'Guardando…':modal.mode==='add'?'Crear mesa':'Guardar cambios'}</Btn>
              <Btn variant="ghost" onClick={()=>setModal(null)}>Cancelar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}
