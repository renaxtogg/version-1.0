function PersonalPage() {
  const [profiles,setProfiles] = useState([]);
  const [loading,setLoading] = useState(true);
  const [error,setError] = useState(null);
  const [editId,setEditId] = useState(null);
  const [editRole,setEditRole] = useState('');

  useEffect(()=>{
    if(!db){setLoading(false);return;}
    db.from('profiles').select('id,username,display_name,role,created_at').order('created_at')
      .then(({data,error:e})=>{
        if(e)setError(e.message);
        else setProfiles(data||[]);
        setLoading(false);
      });
  },[]);

  async function saveRole(id) {
    const{error:e}=await db.from('profiles').update({role:editRole}).eq('id',id);
    e?toast('Error: '+e.message,false):(toast('Rol actualizado'),setProfiles(p=>p.map(x=>x.id===id?{...x,role:editRole}:x)),setEditId(null));
  }

  const roleColor={cocina:C.orange,admin:C.blue,superadmin:C.purple,waiter:C.green};

  return (
    <div className="page">
      <h1 style={{fontSize:22,fontWeight:800,marginBottom:6}}>Personal</h1>
      <div style={{fontSize:12,color:'#555',marginBottom:16}}>Usuarios con acceso al sistema</div>
      {loading&&<span className="spin"/>}
      {error&&<div style={{color:C.red,fontSize:13,padding:16,background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:8,marginBottom:14}}>{error}</div>}
      {!loading&&!error&&(
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><Th>Usuario</Th><Th>Nombre</Th><Th>Rol</Th><Th>Desde</Th><Th>Acc.</Th></tr></thead>
            <tbody>
              {profiles.map(p=>(
                <tr key={p.id} style={{borderBottom:`1px solid #0d0d0d`}}>
                  <Td mono>{p.username}</Td>
                  <Td>{p.display_name||'—'}</Td>
                  <Td>
                    {editId===p.id
                      ?<Sel value={editRole} onChange={e=>setEditRole(e.target.value)} style={{width:130}}>
                          {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
                        </Sel>
                      :<span style={{background:(roleColor[p.role]||'#666')+'22',color:roleColor[p.role]||'#666',border:`1px solid ${(roleColor[p.role]||'#666')}44`,padding:'3px 9px',fontSize:11,fontWeight:700,borderRadius:5}}>{p.role}</span>}
                  </Td>
                  <Td dim>{fmtDate(p.created_at)}</Td>
                  <Td>
                    {editId===p.id
                      ?<div style={{display:'flex',gap:5}}><Btn small onClick={()=>saveRole(p.id)}>✓</Btn><Btn small variant="ghost" onClick={()=>setEditId(null)}>✕</Btn></div>
                      :<Btn small variant="secondary" onClick={()=>{setEditId(p.id);setEditRole(p.role);}}>Editar rol</Btn>}
                  </Td>
                </tr>
              ))}
              {profiles.length===0&&<EmptyRow cols={5} label="Sin usuarios registrados"/>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   CLIENTES
══════════════════════════════════════════════ */
function ClientesPage({orders}) {
  const [view,setView] = useState('todos');
  const { clientMap, inactivos, frecuentes } = useMemo(()=>{
    const m={};
    orders.filter(o=>!['draft','cancelled'].includes(o.status)&&o.customer_name).forEach(o=>{
      const k=o.customer_name;
      if(!m[k])m[k]={name:k,phone:o.customer_phone||null,orders:0,total:0,lastDate:o.created_at};
      m[k].orders++;
      m[k].total+=(o.total||0);
      // ISO strings son comparables lexicográficamente — no se necesita new Date()
      if(o.created_at>m[k].lastDate)m[k].lastDate=o.created_at;
    });
    const all=Object.values(m).sort((a,b)=>b.orders-a.orders);
    const cutoff=new Date(Date.now()-30*864e5).toISOString();
    return {
      clientMap: all,
      inactivos: all.filter(c=>c.lastDate<cutoff),
      frecuentes: all.filter(c=>c.orders>=3),
    };
  },[orders]);

  const now=Date.now();
  const INACTIVE_DAYS=30;
  const displayed = view==='frecuentes'?frecuentes:view==='inactivos'?inactivos:clientMap;

  return (
    <div className="page">
      <h1 style={{fontSize:22,fontWeight:800,marginBottom:16}}>Clientes</h1>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <KpiCard label="Clientes únicos"  value={clientMap.length} sub="con nombre registrado"/>
        <KpiCard label="Frecuentes"       value={frecuentes.length} sub="3+ pedidos" accent={C.green}/>
        <KpiCard label="Inactivos"        value={inactivos.length} sub={`+${INACTIVE_DAYS} días sin pedir`} accent={inactivos.length>5?C.orange:C.mid}/>
      </div>
      <div style={{display:'flex',gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:0}}>
        {[['todos','Todos'],['frecuentes','Frecuentes'],['inactivos',`Inactivos +${INACTIVE_DAYS}d`]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setView(id)} style={{background:'none',border:'none',color:view===id?C.white:'#444',padding:'8px 14px',fontSize:12,fontWeight:view===id?700:400,borderBottom:view===id?'2px solid #fff':'2px solid transparent',cursor:'pointer',marginBottom:-1}}>{lbl}</button>
        ))}
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden',marginTop:0}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><Th>Nombre</Th><Th>Teléfono</Th><Th right>Pedidos</Th><Th right>Total gastado</Th><Th>Último pedido</Th></tr></thead>
          <tbody>
            {displayed.map((c,i)=>{
              const diasInactivo=Math.floor((now-new Date(c.lastDate).getTime())/864e5);
              return (
                <tr key={i} style={{borderBottom:`1px solid #0d0d0d`}}>
                  <Td>{c.name}</Td>
                  <Td dim>{c.phone||'—'}</Td>
                  <Td right><span style={{fontFamily:'JetBrains Mono',fontWeight:700,color:c.orders>=3?C.green:C.white}}>{c.orders}</span></Td>
                  <Td mono right>{fmt(c.total)}</Td>
                  <Td><span style={{color:diasInactivo>30?C.orange:C.mid}}>{fmtDate(c.lastDate)} <span style={{fontSize:10,color:'#555'}}>{diasInactivo>0?`hace ${diasInactivo}d`:''}</span></span></Td>
                </tr>
              );
            })}
            {displayed.length===0&&<EmptyRow cols={5} label="Sin clientes en este filtro"/>}
          </tbody>
        </table>
      </div>
      {clientMap.length===0&&<div style={{marginTop:12,fontSize:12,color:'#444',padding:'10px 14px',background:'rgba(255,255,255,0.02)',borderRadius:8}}>Los pedidos deben incluir nombre del cliente para aparecer aquí.</div>}
    </div>
  );
}

/* ══════════════════════════════════════════════
   FINANZAS
══════════════════════════════════════════════ */
function FinanzasPage({orders}) {
  const [period,setPeriod] = useState('semana');
  const [egresos,setEgresos] = useState(()=>LS.get(EGRESOS_KEY,[]));
  const [delivPct,setDelivPct] = useState(()=>LS.get(DELIV_KEY,0));
  const [showEgForm,setShowEgForm] = useState(false);
  const [egForm,setEgForm] = useState({date:new Date().toISOString().slice(0,10),desc:'',amount:'',category:'Insumos'});

  const valid = o => !['draft','cancelled'].includes(o.status);
  function periodStart(p, asString=false) {
    const d=new Date();
    if(p==='hoy'){d.setHours(0,0,0,0);}
    else if(p==='semana'){d.setDate(d.getDate()-6);d.setHours(0,0,0,0);}
    else{d.setDate(1);d.setHours(0,0,0,0);}
    return asString ? d.toISOString().slice(0,10) : d;
  }
  const start=periodStart(period);
  const periodOrders=orders.filter(o=>valid(o)&&new Date(o.created_at)>=start);
  const ingresos=periodOrders.reduce((s,o)=>s+(o.total||0),0);
  const llevarOrders=periodOrders.filter(o=>o.order_type==='llevar');
  const llevarTotal=llevarOrders.reduce((s,o)=>s+(o.total||0),0);
  const comision=Math.round(llevarTotal*(delivPct/100));

  const egPeriod=egresos.filter(e=>e.date>=periodStart(period, true));
  const egresoTotal=egPeriod.reduce((s,e)=>s+(e.amount||0),0);
  const margen=ingresos-egresoTotal-comision;
  const margenPct=ingresos>0?Math.round(margen/ingresos*100):0;

  function addEgreso() {
    if(!egForm.desc||!egForm.amount){toast('Completá descripción y monto',false);return;}
    const item={id:Date.now().toString(),date:egForm.date,desc:egForm.desc,amount:parseInt(egForm.amount),category:egForm.category};
    const updated=[item,...egresos];setEgresos(updated);LS.set(EGRESOS_KEY,updated);
    toast('Egreso registrado');setShowEgForm(false);setEgForm({date:new Date().toISOString().slice(0,10),desc:'',amount:'',category:'Insumos'});
  }
  function delEgreso(id){const u=egresos.filter(e=>e.id!==id);setEgresos(u);LS.set(EGRESOS_KEY,u);toast('Eliminado');}

  const egByCat=EG_CATS.map(cat=>({cat,total:egPeriod.filter(e=>e.category===cat).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  const maxCat=egByCat[0]?.total||1;

  return (
    <div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h1 style={{fontSize:22,fontWeight:800}}>Finanzas</h1>
        <div style={{display:'flex',gap:6}}>
          {['hoy','semana','mes'].map(p=>(
            <button key={p} onClick={()=>setPeriod(p)} style={{background:period===p?'rgba(255,255,255,0.1)':'transparent',border:`1px solid ${period===p?C.bs:C.border}`,color:period===p?C.white:C.mid,padding:'6px 14px',fontSize:12,fontWeight:period===p?700:400,borderRadius:6,cursor:'pointer',textTransform:'capitalize'}}>{p}</button>
          ))}
        </div>
      </div>
      <div style={{background:'rgba(251,191,36,0.06)',border:'1px solid rgba(251,191,36,0.2)',borderRadius:8,padding:'8px 14px',marginBottom:14,fontSize:11,color:'#888'}}>Egresos guardados en este navegador (localStorage). Para producción, crear tabla <code style={{fontFamily:'JetBrains Mono'}}>expenses</code> en Supabase.</div>

      {/* KPIs financieros */}
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <KpiCard label={`Ingresos (${period})`} value={fmt(ingresos)} sub={`${periodOrders.length} pedidos`} accent={C.green}/>
        <KpiCard label={`Egresos (${period})`}  value={fmt(egresoTotal)} sub={`${egPeriod.length} registros`} accent={C.red}/>
        <KpiCard label="Margen estimado"         value={fmt(margen)} sub={`${margenPct}% del ingreso`} accent={margenPct>=30?C.green:margenPct>=10?C.yellow:C.red}/>
        <KpiCard label="Ventas delivery"         value={fmt(llevarTotal)} sub={`${llevarOrders.length} pedidos llevar`}/>
        <KpiCard label="Comisión delivery"       value={fmt(comision)} sub={`${delivPct}% del delivery`} accent={C.orange}/>
      </div>

      {/* Config comisión delivery */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:16,marginBottom:14,display:'flex',alignItems:'center',gap:14}}>
        <div style={{fontSize:11,color:'#555',fontWeight:700,letterSpacing:1}}>COMISIÓN DELIVERY %</div>
        <input type="number" value={delivPct} onChange={e=>{const v=parseInt(e.target.value)||0;setDelivPct(v);LS.set(DELIV_KEY,v);}} min={0} max={50} style={{width:70,padding:'6px 9px',fontSize:14,fontFamily:'JetBrains Mono',textAlign:'right',background:'#111',border:'1px solid #333',color:'#fff',borderRadius:6}}/>
        <span style={{fontSize:12,color:'#555'}}>% sobre total pedidos para llevar</span>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:14}}>
        {/* Egresos list */}
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:11,color:'#555',fontWeight:700,letterSpacing:1}}>EGRESOS REGISTRADOS</div>
            <Btn small onClick={()=>setShowEgForm(!showEgForm)}>+ Agregar</Btn>
          </div>
          {showEgForm&&(
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:16,marginBottom:10}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                <div><Lbl>FECHA</Lbl><Inp type="date" value={egForm.date} onChange={e=>setEgForm({...egForm,date:e.target.value})}/></div>
                <div><Lbl>MONTO (₲) *</Lbl><Inp type="number" mono value={egForm.amount} onChange={e=>setEgForm({...egForm,amount:e.target.value})} placeholder="50000"/></div>
                <div><Lbl>CATEGORÍA</Lbl><Sel value={egForm.category} onChange={e=>setEgForm({...egForm,category:e.target.value})}>{EG_CATS.map(c=><option key={c}>{c}</option>)}</Sel></div>
                <div><Lbl>DESCRIPCIÓN *</Lbl><Inp value={egForm.desc} onChange={e=>setEgForm({...egForm,desc:e.target.value})} placeholder="Descripción…"/></div>
              </div>
              <div style={{display:'flex',gap:8}}><Btn small onClick={addEgreso}>Guardar</Btn><Btn small variant="ghost" onClick={()=>setShowEgForm(false)}>Cancelar</Btn></div>
            </div>
          )}
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><Th>Fecha</Th><Th>Descripción</Th><Th>Cat.</Th><Th right>Monto</Th><Th/></tr></thead>
              <tbody>
                {egPeriod.map(e=>(
                  <tr key={e.id} style={{borderBottom:`1px solid #0d0d0d`}}>
                    <Td mono dim>{e.date}</Td>
                    <Td>{e.desc}</Td>
                    <Td dim>{e.category}</Td>
                    <Td mono right style={{color:C.red}}>{fmt(e.amount)}</Td>
                    <Td><button onClick={()=>delEgreso(e.id)} style={{background:'none',border:'none',color:'#444',cursor:'pointer',fontSize:14}}>✕</button></Td>
                  </tr>
                ))}
                {egPeriod.length===0&&<EmptyRow cols={5} label="Sin egresos este período"/>}
              </tbody>
            </table>
          </div>
        </div>

        {/* Distribución por categoría */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:18}}>
          <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:14}}>EGRESOS POR CATEGORÍA</div>
          {egByCat.length===0&&<div style={{color:'#333',fontSize:12}}>Sin egresos este período</div>}
          {egByCat.map(({cat,total})=>(
            <div key={cat} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                <span style={{color:C.mid}}>{cat}</span>
                <span style={{fontFamily:'JetBrains Mono',color:C.red}}>{fmt(total)}</span>
              </div>
              <div style={{height:4,background:'#1a1a1a',borderRadius:2,overflow:'hidden'}}>
                <div style={{width:`${(total/maxCat)*100}%`,height:'100%',background:C.red,borderRadius:2}}/>
              </div>
            </div>
          ))}
          {egByCat.length>0&&(
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12,marginTop:4,display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700}}>
              <span>Total</span><span style={{fontFamily:'JetBrains Mono',color:C.red}}>{fmt(egresoTotal)}</span>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   MARKETING
══════════════════════════════════════════════ */
function MarketingPage({coupons,orders,onRefresh}) {
  const [tab,setTab] = useState('cupones');
  const [form,setForm] = useState({code:'',discount_type:'percentage',discount_value:'',min_order_amount:'',max_uses:''});
  const [saving,setSaving] = useState(false);
  const [tplId,setTplId] = useState('promo');
  const [tplVars,setTplVars] = useState({nombre:'',descuento:'10',codigo:'',fecha:'',mesa:''});
  const [copied,setCopied] = useState(false);

  const TPLS = [
    {id:'promo',label:'Promoción',msg:'Hola {nombre}! 👋 Tenemos una promo especial para vos: {descuento}% OFF usando el código *{codigo}*. Válido hasta el {fecha}. ¡Te esperamos en La Huaca! 🍽'},
    {id:'inactive',label:'Cliente inactivo',msg:'Hola {nombre}! Hace tiempo que no te vemos 😊. Tenemos novedades en el menú. Pasate por La Huaca o pedí escaneando el QR de tu mesa. ¡Te esperamos!'},
    {id:'birthday',label:'Cumpleaños',msg:'Hola {nombre}! 🎂 El equipo de La Huaca te desea un feliz cumpleaños. Como regalo tenés {descuento}% OFF con el código *{codigo}*. ¡Celebrá con nosotros!'},
  ];
  const tpl=TPLS.find(t=>t.id===tplId);
  const preview=tpl?tpl.msg.replace(/\{(\w+)\}/g,(_,k)=>tplVars[k]||`{${k}}`):'' ;

  function copyMsg(){navigator.clipboard?.writeText(preview);setCopied(true);setTimeout(()=>setCopied(false),2000);}

  const now=Date.now();
  const inactivos=useMemo(()=>{
    const m={};
    orders.filter(o=>!['draft','cancelled'].includes(o.status)&&o.customer_name).forEach(o=>{
      const k=o.customer_name;
      if(!m[k]||o.created_at>m[k].last)m[k]={name:k,phone:o.customer_phone||null,last:o.created_at};
    });
    const cutoff=new Date(Date.now()-30*864e5).toISOString();
    return Object.values(m).filter(c=>c.last<cutoff).sort((a,b)=>a.last<b.last?-1:1);
  },[orders]);

  async function addCoupon(){
    if(!db||!form.code||!form.discount_value){toast('Completá código y valor',false);return;}
    setSaving(true);
    const{error}=await db.from('coupons').insert({restaurant_id:RID,code:form.code.toUpperCase().trim(),discount_type:form.discount_type,discount_value:parseInt(form.discount_value),min_order_amount:parseInt(form.min_order_amount)||0,max_uses:form.max_uses?parseInt(form.max_uses):null,is_active:true});
    error?toast('Error: '+error.message,false):(toast('Cupón creado'),setForm({code:'',discount_type:'percentage',discount_value:'',min_order_amount:'',max_uses:''}),onRefresh());
    setSaving(false);
  }
  async function toggleCoupon(id,current){
    const{error}=await db.from('coupons').update({is_active:!current}).eq('id',id);
    error?toast('Error: '+error.message,false):(toast(current?'Cupón desactivado':'Cupón activado'),onRefresh());
  }

  return (
    <div className="page">
      <h1 style={{fontSize:22,fontWeight:800,marginBottom:16}}>Marketing</h1>
      <div style={{display:'flex',gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:16}}>
        {[['cupones','Cupones'],['whatsapp','WhatsApp'],['inactivos','Clientes inactivos']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{background:'none',border:'none',color:tab===id?C.white:'#444',padding:'8px 14px',fontSize:12,fontWeight:tab===id?700:400,borderBottom:tab===id?'2px solid #fff':'2px solid transparent',cursor:'pointer',marginBottom:-1}}>{lbl}</button>
        ))}
      </div>

      {tab==='cupones'&&(
        <div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:18,marginBottom:14}}>
            <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:12}}>NUEVO CUPÓN / DESCUENTO</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10,marginBottom:12}}>
              <div><Lbl>CÓDIGO *</Lbl><Inp value={form.code} onChange={e=>setForm({...form,code:e.target.value.toUpperCase()})} placeholder="PROMO20"/></div>
              <div><Lbl>TIPO</Lbl><Sel value={form.discount_type} onChange={e=>setForm({...form,discount_type:e.target.value})}><option value="percentage">% Porcentaje</option><option value="fixed">₲ Fijo</option></Sel></div>
              <div><Lbl>VALOR *</Lbl><Inp type="number" mono value={form.discount_value} onChange={e=>setForm({...form,discount_value:e.target.value})} placeholder={form.discount_type==='percentage'?'10':'5000'}/></div>
              <div><Lbl>MONTO MÍN. (₲)</Lbl><Inp type="number" mono value={form.min_order_amount} onChange={e=>setForm({...form,min_order_amount:e.target.value})} placeholder="0"/></div>
              <div><Lbl>USOS MÁX.</Lbl><Inp type="number" mono value={form.max_uses} onChange={e=>setForm({...form,max_uses:e.target.value})} placeholder="∞"/></div>
            </div>
            <Btn onClick={addCoupon} disabled={saving||!form.code||!form.discount_value}>{saving?'Creando…':'Crear cupón'}</Btn>
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><Th>Código</Th><Th>Descuento</Th><Th>Tipo</Th><Th>Mín.</Th><Th>Usos</Th><Th>Estado</Th></tr></thead>
              <tbody>
                {coupons.map(c=>(
                  <tr key={c.id} style={{borderBottom:`1px solid #0d0d0d`}}>
                    <Td><span style={{fontFamily:'JetBrains Mono',fontWeight:700}}>{c.code}</span></Td>
                    <Td><span style={{fontFamily:'JetBrains Mono',color:C.green,fontWeight:700}}>{c.discount_type==='percentage'?`${c.discount_value}%`:fmt(c.discount_value)}</span></Td>
                    <Td dim>{c.discount_type==='percentage'?'Porcentaje':'Fijo'}</Td>
                    <Td mono dim>{c.min_order_amount>0?fmt(c.min_order_amount):'—'}</Td>
                    <Td mono>{c.used_count||0}/{c.max_uses||'∞'}</Td>
                    <Td><button onClick={()=>toggleCoupon(c.id,c.is_active)} style={{background:c.is_active?'rgba(34,197,94,0.1)':'rgba(255,255,255,0.04)',border:`1px solid ${c.is_active?'rgba(34,197,94,0.3)':C.border}`,color:c.is_active?C.green:'#444',padding:'3px 9px',fontSize:11,fontWeight:600,borderRadius:5}}>{c.is_active?'Activo':'Inactivo'}</button></Td>
                  </tr>
                ))}
                {coupons.length===0&&<EmptyRow cols={6} label="Sin cupones"/>}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==='whatsapp'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div>
            <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:10}}>PLANTILLA</div>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
              {TPLS.map(t=>(
                <button key={t.id} onClick={()=>setTplId(t.id)} style={{textAlign:'left',padding:'10px 14px',background:tplId===t.id?'rgba(255,255,255,0.08)':'#0d0d0d',border:`1px solid ${tplId===t.id?C.bs:C.border}`,borderRadius:8,cursor:'pointer',color:tplId===t.id?C.white:C.mid,fontSize:13,fontWeight:tplId===t.id?600:400}}>
                  {t.label}
                </button>
              ))}
            </div>
            <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:10}}>VARIABLES</div>
            {['nombre','descuento','codigo','fecha'].map(k=>(
              <div key={k} style={{marginBottom:8}}><Lbl>{k.toUpperCase()}</Lbl><Inp value={tplVars[k]||''} onChange={e=>setTplVars({...tplVars,[k]:e.target.value})} placeholder={k}/></div>
            ))}
          </div>
          <div>
            <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:10}}>PREVIEW</div>
            <div style={{background:'#0a1a12',border:'1px solid rgba(34,197,94,0.2)',borderRadius:12,padding:18,fontSize:14,lineHeight:1.6,color:'#d1fae5',minHeight:180,fontFamily:'inherit',whiteSpace:'pre-wrap',marginBottom:12}}>
              {preview}
            </div>
            <Btn onClick={copyMsg} variant={copied?'primary':'secondary'}>{copied?'✓ Copiado!':'Copiar mensaje'}</Btn>
            <div style={{fontSize:11,color:'#444',marginTop:8}}>Pegá el mensaje en WhatsApp Web o WhatsApp Desktop manualmente.</div>
          </div>
        </div>
      )}

      {tab==='inactivos'&&(
        <div>
          <div style={{fontSize:12,color:'#555',marginBottom:12}}>{inactivos.length} clientes sin pedidos en los últimos 30 días</div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><Th>Cliente</Th><Th>Teléfono</Th><Th>Último pedido</Th><Th>Días inactivo</Th></tr></thead>
              <tbody>
                {inactivos.map((c,i)=>{
                  const dias=Math.floor((now-new Date(c.last).getTime())/864e5);
                  return (
                    <tr key={i} style={{borderBottom:`1px solid #0d0d0d`}}>
                      <Td>{c.name}</Td>
                      <Td dim>{c.phone||'—'}</Td>
                      <Td dim>{fmtDate(c.last)}</Td>
                      <Td><span style={{color:dias>60?C.red:C.orange,fontFamily:'JetBrains Mono',fontWeight:700}}>{dias}d</span></Td>
                    </tr>
                  );
                })}
                {inactivos.length===0&&<EmptyRow cols={4} label="Todos los clientes estuvieron activos recientemente"/>}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   CALIFICACIONES
══════════════════════════════════════════════ */
function RatingsPage({ratings}) {
  const avg = ratings.length ? (ratings.reduce((s,r)=>s+r.stars,0)/ratings.length).toFixed(1) : '0.0';
  const dist = [5,4,3,2,1].map(s=>({s,n:ratings.filter(r=>r.stars===s).length}));
  return (
    <div className="page">
      <h1 style={{fontSize:22,fontWeight:800,marginBottom:20}}>Calificaciones</h1>
      <div style={{display:'flex',gap:12,marginBottom:16}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'20px 26px',minWidth:160}}>
          <div style={{fontSize:42,fontWeight:800,fontFamily:'JetBrains Mono',color:C.yellow,lineHeight:1}}>{avg}</div>
          <div style={{fontSize:16,color:C.yellow,margin:'8px 0 4px'}}>{'★'.repeat(Math.round(Number(avg)))}</div>
          <div style={{fontSize:12,color:'#555'}}>{ratings.length} calificaciones</div>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'16px 20px',flex:1}}>
          {dist.map(({s,n})=>{
            const pct=ratings.length?Math.round(n/ratings.length*100):0;
            return (
              <div key={s} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                <span style={{color:C.yellow,fontSize:12,width:10}}>{s}</span>
                <span style={{color:C.yellow,fontSize:10}}>★</span>
                <div style={{flex:1,height:6,background:'#1a1a1a',borderRadius:3,overflow:'hidden'}}><div style={{width:`${pct}%`,height:'100%',background:C.yellow,borderRadius:3}}/></div>
                <span style={{fontSize:11,color:'#555',width:24,textAlign:'right'}}>{n}</span>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><Th>Rating</Th><Th>Comentario</Th><Th>Fecha</Th></tr></thead>
          <tbody>
            {ratings.map(r=>(
              <tr key={r.id} style={{borderBottom:`1px solid #0d0d0d`}}>
                <Td><Stars n={r.stars}/></Td>
                <Td style={{color:r.comment?C.ink:'#333',fontStyle:r.comment?'normal':'italic'}}>{r.comment||'Sin comentario'}</Td>
                <Td mono dim>{fmtDate(r.created_at)}</Td>
              </tr>
            ))}
            {ratings.length===0&&<EmptyRow cols={3} label="Sin calificaciones aún"/>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════ */
function ConfigPage({restaurant,onRefresh}) {
  const [form,setForm] = useState({});
  const [hours,setHours] = useState([]);
  const [saving,setSaving] = useState(false);
  const [savingH,setSavingH] = useState(false);

  useEffect(()=>{
    if(restaurant){
      setForm(restaurant);
      const h=restaurant.opening_hours;
      setHours(Array.isArray(h)&&h.length>0?h:[{day:'Lun–Vie',hours:'12:00–15:00 · 19:00–23:00'},{day:'Sábados',hours:'12:00–23:30'},{day:'Domingos',hours:'12:00–16:00'}]);
    }
  },[restaurant]);

  async function save(){
    if(!db)return;setSaving(true);
    const upd={name:form.name,address:form.address,phone:form.phone,instagram:form.instagram,website:form.website,logo_initials:form.logo_initials};
    if('cover_image_url' in (restaurant||{})) upd.cover_image_url=form.cover_image_url||null;
    const{error}=await db.from('restaurants').update(upd).eq('id',RID);
    error?toast('Error: '+error.message,false):(toast('Cambios guardados — se reflejan en la app al refrescar'),onRefresh());
    setSaving(false);
  }
  async function saveHours(){
    if(!db)return;setSavingH(true);
    if(!('opening_hours' in (restaurant||{}))){
      toast('Columna opening_hours no existe aún — ejecutá migración 009 en Supabase',false);
      setSavingH(false);return;
    }
    const{error}=await db.from('restaurants').update({opening_hours:hours}).eq('id',RID);
    error?toast('Error: '+error.message,false):(toast('Horarios guardados'),onRefresh());
    setSavingH(false);
  }

  const FIELDS=[{key:'name',label:'Nombre del restaurante'},{key:'address',label:'Dirección'},{key:'phone',label:'Teléfono'},{key:'instagram',label:'Instagram',ph:'@lahuaca'},{key:'website',label:'Sitio web',ph:'lahuaca.com.py'},{key:'logo_initials',label:'Iniciales del logo',ph:'LH'},{key:'cover_image_url',label:'URL foto de portada',ph:'https://i.imgur.com/….jpg'}];

  return (
    <div className="page">
      <h1 style={{fontSize:22,fontWeight:800,marginBottom:20}}>Configuración</h1>
      <div style={{background:'rgba(251,191,36,0.06)',border:'1px solid rgba(251,191,36,0.2)',borderRadius:8,padding:'9px 14px',marginBottom:16,fontSize:12,color:'#888'}}>
        Las fotos se cargan por URL (pegar link directo de imagen). Si los cambios no se reflejan en la app, revisá las políticas RLS de Supabase para la tabla <code style={{fontFamily:'JetBrains Mono'}}>restaurants</code>.
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,maxWidth:760}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:22}}>
          <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:16}}>INFO DEL RESTAURANTE</div>
          {form.cover_image_url&&<div style={{marginBottom:14,borderRadius:8,overflow:'hidden',height:100}}><img src={form.cover_image_url} alt="" style={{width:'100%',height:'100%',objectFit:'cover',opacity:.8}} onError={e=>{e.target.style.display='none';}}/></div>}
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
            {FIELDS.map(f=>(
              <div key={f.key}><Lbl>{f.label.toUpperCase()}</Lbl><Inp value={form[f.key]||''} onChange={e=>setForm({...form,[f.key]:e.target.value})} placeholder={f.ph||f.label}/></div>
            ))}
          </div>
          <Btn onClick={save} disabled={saving}>{saving?'Guardando…':'Guardar cambios'}</Btn>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:22}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1}}>HORARIOS</div>
              <Btn small variant="secondary" onClick={()=>setHours(h=>[...h,{day:'',hours:''}])}>+ Añadir</Btn>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
              {hours.map((h,i)=>(
                <div key={i} style={{display:'flex',gap:6}}>
                  <Inp value={h.day} onChange={e=>setHours(hs=>hs.map((x,j)=>j===i?{...x,day:e.target.value}:x))} placeholder="Lun–Vie" style={{flex:'0 0 110px'}}/>
                  <Inp value={h.hours} onChange={e=>setHours(hs=>hs.map((x,j)=>j===i?{...x,hours:e.target.value}:x))} placeholder="12:00–23:00"/>
                  <button onClick={()=>setHours(hs=>hs.filter((_,j)=>j!==i))} style={{background:'none',border:`1px solid rgba(239,68,68,0.25)`,color:'rgba(239,68,68,0.6)',padding:'0 9px',borderRadius:6,cursor:'pointer',flexShrink:0}}>✕</button>
                </div>
              ))}
            </div>
            <Btn onClick={saveHours} disabled={savingH}>{savingH?'Guardando…':'Guardar horarios'}</Btn>
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:18}}>
            <div style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:1,marginBottom:12}}>ACCESOS RÁPIDOS</div>
            {[{l:'Cocina (KDS)',h:'cocina.html'},{l:'App Cliente',h:'index.html'},{l:'Diagnóstico DB',h:'diag.html'}].map(a=>(
              <a key={a.h} href={a.h} style={{display:'block',padding:'9px 0',color:C.mid,fontSize:13,textDecoration:'none',borderBottom:`1px solid #0d0d0d`}}>→ {a.l}</a>
            ))}
          </div>
          <div style={{background:'#0d0d0d',border:`1px solid ${C.border}`,borderRadius:8,padding:14}}>
            <div style={{fontSize:9,color:'#333',fontWeight:700,marginBottom:5,letterSpacing:1}}>RESTAURANT ID</div>
            <div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#2a2a2a',wordBreak:'break-all'}}>{RID}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════ */
function AdminApp() {
  const [page,setPage] = useState('dashboard');
  const [loading,setLoading] = useState(true);
  const [orders,setOrders] = useState([]);
  const [categories,setCategories] = useState([]);
  const [menuItems,setMenuItems] = useState([]);
  const [tables,setTables] = useState([]);
  const [coupons,setCoupons] = useState([]);
  const [ratings,setRatings] = useState([]);
  const [restaurant,setRestaurant] = useState(null);

  useEffect(()=>{ loadAll(); },[]);

  async function loadAll() {
    setLoading(true);
    if(!db){setLoading(false);return;}
    const [rR,tR,oR,cR,iR,cpR,raR] = await Promise.all([
      db.from('restaurants').select('*').eq('id',RID).single(),
      db.from('tables').select('*').eq('restaurant_id',RID).order('number'),
      db.from('orders').select('id,order_number,order_type,status,subtotal,discount_amount,coupon_code,total,payment_method,customer_name,customer_phone,created_at,table_id').eq('restaurant_id',RID).order('created_at',{ascending:false}).limit(500),
      db.from('menu_categories').select('*').eq('restaurant_id',RID).order('sort_order'),
      db.from('menu_items').select('*').eq('restaurant_id',RID).order('sort_order'),
      db.from('coupons').select('*').eq('restaurant_id',RID).order('created_at',{ascending:false}),
      db.from('ratings').select('*').eq('restaurant_id',RID).order('created_at',{ascending:false}).limit(200),
    ]);
    const tbls=tR.data||[];
    const tableMap={};tbls.forEach(t=>{tableMap[t.id]=t.number;});
    const rawOrds=oR.data||[];
    const orderIds=rawOrds.slice(0,150).map(o=>o.id);
    let countsMap={};
    if(orderIds.length){
      const{data:cd}=await db.from('order_items').select('order_id').in('order_id',orderIds);
      (cd||[]).forEach(it=>{countsMap[it.order_id]=(countsMap[it.order_id]||0)+1;});
    }
    setRestaurant(rR.data);
    setTables(tbls);
    setOrders(rawOrds.map(o=>({...o,table_number:o.table_id?tableMap[o.table_id]:null,items_count:countsMap[o.id]||0})));
    setCategories(cR.data||[]);
    setMenuItems(iR.data||[]);
    setCoupons(cpR.data||[]);
    setRatings(raR.data||[]);
    setLoading(false);
  }

  function renderPage() {
    if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:400,flexDirection:'column',gap:14}}><span className="spin"/><div style={{fontSize:12,color:'#444'}}>Cargando datos…</div></div>;
    if(!db) return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:400,flexDirection:'column',gap:12}}>
        <div style={{fontSize:32,color:'#222'}}>⚠</div>
        <div style={{fontSize:15,fontWeight:700}}>Sin conexión a la base de datos</div>
        <div style={{fontSize:13,color:'#555',maxWidth:340,textAlign:'center'}}>Configurá las credenciales en <code style={{fontFamily:'JetBrains Mono',color:'#666'}}>config.js</code> o en variables de entorno de Vercel.</div>
        <a href="diag.html" style={{fontSize:13,color:C.mid,marginTop:8}}>→ Ver diagnóstico</a>
      </div>
    );
    switch(page){
      case 'dashboard': return <DashboardPage orders={orders} ratings={ratings}/>;
      case 'pedidos':   return <PedidosPage orders={orders} onRefresh={loadAll}/>;
      case 'menu':      return <MenuPage categories={categories} menuItems={menuItems} onRefresh={loadAll}/>;
      case 'mesas':     return <MesasPage tables={tables} orders={orders} onRefresh={loadAll}/>;
      case 'personal':  return <PersonalPage/>;
      case 'clientes':  return <ClientesPage orders={orders}/>;
      case 'finanzas':  return <FinanzasPage orders={orders}/>;
      case 'marketing': return <MarketingPage coupons={coupons} orders={orders} onRefresh={loadAll}/>;
      case 'ratings':   return <RatingsPage ratings={ratings}/>;
      case 'config':    return <ConfigPage restaurant={restaurant} onRefresh={loadAll}/>;
      default: return null;
    }
  }

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} setPage={setPage} restaurant={restaurant} dbOk={!!db}/>
      <main style={{flex:1,padding:26,overflowY:'auto',minWidth:0}}>
        {renderPage()}
      </main>
      <ToastContainer/>
    </div>
  );
}

/* ── AUTH GUARD ── */
async function bootstrap() {
  if(!db){window.location.replace('login.html');return;}
  const{data:{session}}=await db.auth.getSession();
  if(!session){window.location.replace('login.html');return;}
  const{data:profile}=await db.rpc('get_my_profile');
  if(!profile||!['admin','superadmin'].includes(profile.role)){await db.auth.signOut();window.location.replace('login.html');return;}
  window._userProfile=profile;
  ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp/>);
}
bootstrap();
</script>
