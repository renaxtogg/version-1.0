<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── SUPABASE CLIENT ─── */
const _initDB = () => {
  const cfg = window.SUPABASE_CONFIG;
  if (!cfg || !cfg.url || !cfg.anonKey) return null;
  const url = cfg.url.replace(/^﻿/, '').trim();
  const key = cfg.anonKey.replace(/^﻿/, '').trim();
  if (!url || url.includes('YOUR_') || !key) return null;
  try { return window.supabase.createClient(url, key); } catch(e) { return null; }
};
const db = _initDB();
const RESTAURANT_ID = ((window.SUPABASE_CONFIG && window.SUPABASE_CONFIG.restaurantId) || '00000000-0000-0000-0000-000000000001').replace(/^﻿/, '').trim();

/* ── STATUS MAPPING ─── */
const toKitchenStatus = s => s === 'cooking' ? 'preparando' : s === 'ready' ? 'listo' : 'nuevo';
const nextKitchenStatus = s => s === 'nuevo' ? 'preparando' : 'listo';
const nextSupabaseStatus = s => s === 'nuevo' ? 'cooking' : 'ready';

/* ── SONIDO ─── */
function playBeep(type = 'new') {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = type === 'new' ? [880, 1100] : [660];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      g.gain.setValueAtTime(0.35, ctx.currentTime + i * 0.28);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.28 + 0.35);
      osc.start(ctx.currentTime + i * 0.28);
      osc.stop(ctx.currentTime + i * 0.28 + 0.4);
    });
  } catch(e) {}
}

/* ── ALERGIAS ─── */
const ALLERGY_KW = ['alergi','celíac','celiac','gluten','lactosa','intoler','maní','maní','nuez','marisco','camarón','creveta','soja','anafilax','sin gluten','sin lactosa'];
function hasAllergyAlert(text) {
  if (!text) return false;
  const l = text.toLowerCase();
  return ALLERGY_KW.some(k => l.includes(k));
}

/* ── URGENCIA ─── */
function urgencyLevel(min, status) {
  if (status === 'listo' || status === 'entregado') return 0;
  if (min >= 30) return 3;
  if (min >= 20) return 2;
  if (min >= 12) return 1;
  return 0;
}
const URGENCY_COLOR = [null, '#F59E0B', '#F97316', '#EF4444'];
const URGENCY_LABEL = [null, 'DEMORADO', 'URGENTE', 'CRÍTICO'];

/* ── STATS (localStorage por día) ─── */
function todayKey() { return `cocina_stats_${new Date().toDateString()}`; }
function loadStats() {
  try { return JSON.parse(localStorage.getItem(todayKey()) || '{"times":[],"hourly":{}}'); }
  catch { return { times: [], hourly: {} }; }
}
function recordDone(minElapsed) {
  try {
    const s = loadStats();
    s.times.push(minElapsed);
    const h = new Date().getHours();
    s.hourly[h] = (s.hourly[h] || 0) + 1;
    localStorage.setItem(todayKey(), JSON.stringify(s));
  } catch {}
}
function getStats() {
  const s = loadStats();
  const avg = s.times.length ? Math.round(s.times.reduce((a, b) => a + b, 0) / s.times.length) : null;
  const peak = Object.entries(s.hourly).sort((a, b) => b[1] - a[1])[0] || null;
  return { avg, total: s.times.length, peak: peak ? { h: parseInt(peak[0]), n: peak[1] } : null };
}

/* ── SUPABASE HELPERS ─── */
function orderToTicket(order) {
  const created = new Date(order.created_at);
  const elapsed = Math.floor((Date.now() - created.getTime()) / 60000);
  return {
    id: order.order_number,
    _supabaseId: order.id,
    mesa: order.tables ? order.tables.number : '?',
    tipo: order.order_type === 'llevar' ? 'llevar' : 'local',
    hora: created.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit' }),
    elapsed,
    status: toKitchenStatus(order.status),
    items: (order.order_items || []).map((oi, i) => ({
      id: i + 1,
      nombre: oi.item_name,
      cant: oi.quantity,
      extras: (oi.order_item_extras || []).map(e => e.extra_name),
      obs: oi.observations || ''
    }))
  };
}

// Hace 4 queries planas y combina en cliente (evita permisos nested PostgREST con anon)
async function dbLoadTickets() {
  if (!db) return { tickets: null, error: null };
  const { data: orders, error } = await db.from('orders')
    .select('id,order_number,order_type,status,created_at,table_id')
    .eq('restaurant_id', RESTAURANT_ID)
    .in('status', ['paid','kitchen_received','cooking','ready'])
    .order('created_at', { ascending: true });
  if (error) {
    console.error('dbLoadTickets orders error:', error);
    return { tickets: null, error: error.message || 'Error al cargar pedidos' };
  }
  if (!orders || orders.length === 0) return { tickets: [], error: null };

  const tableIds = [...new Set(orders.map(o => o.table_id).filter(Boolean))];
  const tableMap = {};
  if (tableIds.length > 0) {
    const { data: tbls } = await db.from('tables').select('id,number').in('id', tableIds);
    (tbls || []).forEach(t => { tableMap[t.id] = t.number; });
  }

  const orderIds = orders.map(o => o.id);
  const { data: items } = await db.from('order_items')
    .select('id,order_id,item_name,quantity,observations').in('order_id', orderIds);

  const extrasMap = {};
  if ((items || []).length > 0) {
    const { data: extras } = await db.from('order_item_extras')
      .select('order_item_id,extra_name').in('order_item_id', items.map(i => i.id));
    (extras || []).forEach(e => {
      if (!extrasMap[e.order_item_id]) extrasMap[e.order_item_id] = [];
      extrasMap[e.order_item_id].push({ extra_name: e.extra_name });
    });
  }

  const itemsByOrder = {};
  (items || []).forEach(item => {
    if (!itemsByOrder[item.order_id]) itemsByOrder[item.order_id] = [];
    itemsByOrder[item.order_id].push({ ...item, order_item_extras: extrasMap[item.id] || [] });
  });

  const tickets = orders.map(o => ({
    ...o,
    tables: o.table_id ? { number: tableMap[o.table_id] || null } : null,
    order_items: itemsByOrder[o.id] || []
  })).map(orderToTicket);
  return { tickets, error: null };
}

async function dbAdvanceTicket(supabaseId, currentKitchenStatus) {
  if (!db || !supabaseId) return;
  const newStatus = nextSupabaseStatus(currentKitchenStatus);
  try {
    await db.from('orders').update({ status: newStatus }).eq('id', supabaseId);
    await db.from('order_status_history').insert({ order_id: supabaseId, status: newStatus, changed_by: 'kitchen' });
  } catch(e) { console.warn('Advance error:', e); }
}

async function dbDismissTicket(supabaseId) {
  if (!db || !supabaseId) return;
  try {
    await db.from('orders').update({ status: 'delivered', completed_at: new Date().toISOString() }).eq('id', supabaseId);
    await db.from('order_status_history').insert({ order_id: supabaseId, status: 'delivered', changed_by: 'kitchen' });
  } catch(e) { console.warn('Dismiss error:', e); }
}

/* ── PALETTE ─── */
const C = {

const COL_COLOR = {

};

/* Lookup tables para urgencia — evitan ternarios en cada render */
const URGENCY_BORDER = [C.borderStrong, '#F59E0B', '#F97316', '#EF4444'];
const URGENCY_HEADER = ['#111', 'rgba(245,158,11,0.12)', 'rgba(249,115,22,0.18)', 'rgba(239,68,68,0.22)'];

/* ── DEMO ─── */
const DEMO_TICKETS = [
  { id:'T-2841', _supabaseId:null, mesa:2, tipo:'local', hora:'19:04', elapsed:22, status:'preparando',
    items:[{id:1,nombre:'Lomito completo',cant:2,extras:['Extra carne','Huevo frito'],obs:'Sin mayo en una'},{id:2,nombre:'Provoleta parrilla',cant:1,extras:[],obs:''},{id:3,nombre:'Sopa paraguaya',cant:2,extras:[],obs:'Bien caliente'}]},

  { id:'T-2843', _supabaseId:null, mesa:1, tipo:'llevar', hora:'19:11', elapsed:11, status:'nuevo',

];

/* ── HELPERS ─── */
function fmtTime(min) { if (min < 60) return `${min}m`; return `${Math.floor(min/60)}h${min%60}m`; }

function sortByUrgency(tickets) {
  return [...tickets].sort((a, b) => {
    const ua = urgencyLevel(a.elapsed, a.status);
    const ub = urgencyLevel(b.elapsed, b.status);
    if (ua !== ub) return ub - ua;
    if (a.tipo === 'llevar' && b.tipo !== 'llevar') return -1;
    if (b.tipo === 'llevar' && a.tipo !== 'llevar') return 1;
    return b.elapsed - a.elapsed;
  });
}

/* ── TICKET CARD ─── */
function TicketCard({ ticket, onAdvance, onDismiss }) {
  const [time, setTime] = useState(ticket.elapsed);
  useEffect(() => { const t = setInterval(() => setTime(v => v + 1), 60000); return () => clearInterval(t); }, []);

  const urgency = urgencyLevel(time, ticket.status);
  const urgColor = URGENCY_COLOR[urgency];
  const isDone = ticket.status === 'listo' || ticket.status === 'entregado';
  const isEntregado = ticket.status === 'entregado';
  const nextStatus = { nuevo: 'preparando', preparando: 'listo' }[ticket.status];
  const hasAnyAllergy = ticket.items.some(i => hasAllergyAlert(i.obs));

  const borderColor = isDone ? C.border : URGENCY_BORDER[urgency];
  const headerBg    = isEntregado ? '#181818' : URGENCY_HEADER[urgency];

  return (
    <div style={{
      background: C.card,
      border: `2px solid ${borderColor}`,
      borderRadius: 14,
      overflow: 'hidden',
      display: 'flex',
      flexDirection: 'column',
      animation: 'fadeIn 300ms ease',
      transition: 'border-color 300ms',
      opacity: isEntregado ? 0.45 : 1,
    }}>
      {/* Barra de color urgencia arriba */}
      {!isDone && (
        <div style={{ height: urgency >= 1 ? 4 : 2, background: urgency >= 1 ? urgColor : 'rgba(255,255,255,0.06)', animation: urgency >= 2 ? 'pulse 1s ease infinite' : 'none' }} />
      )}

      {/* Header */}
      <div style={{
        background: headerBg,
        padding: '10px 13px',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        borderBottom: `1px solid ${C.border}`,
        gap: 6,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, minWidth: 0, flex: 1, overflow: 'hidden' }}>
          <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10, fontWeight: 600, color: C.dim, letterSpacing: '0.08em', flexShrink: 0 }}>{ticket.id}</div>
          <div style={{ width: 1, height: 12, background: C.border, flexShrink: 0 }} />
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 17, color: C.white, flexShrink: 0 }}>Mesa {ticket.mesa}</div>
          {ticket.tipo === 'llevar' && (
            <div style={{ fontSize: 10, fontWeight: 800, background: 'rgba(251,191,36,0.12)', border: '1px solid rgba(251,191,36,0.35)', borderRadius: 5, padding: '2px 6px', color: '#FBB724', letterSpacing: '0.06em', flexShrink: 0 }}>LLEVAR</div>
          )}
          {hasAnyAllergy && (
            <div style={{ fontSize: 10, fontWeight: 800, background: 'rgba(239,68,68,0.14)', border: '1px solid rgba(239,68,68,0.4)', borderRadius: 5, padding: '2px 6px', color: '#EF4444', letterSpacing: '0.05em', animation: 'pulse 1s ease infinite', flexShrink: 0 }}>⚠ ALERGIA</div>
          )}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, flexShrink: 0 }}>
          {urgency >= 1 && !isDone && (
            <div style={{ fontSize: 10, fontWeight: 800, color: urgColor, animation: urgency >= 2 ? 'pulse 1s ease infinite' : 'none', letterSpacing: '0.06em' }}>{URGENCY_LABEL[urgency]}</div>
          )}
          <div style={{
            fontFamily: "'JetBrains Mono',monospace",
            fontSize: 13,
            fontWeight: 700,
            color: isDone ? C.dim : urgColor || C.mid,
            animation: urgency >= 2 && !isDone ? 'pulse 1.2s ease infinite' : 'none',
          }}>{fmtTime(time)}</div>
          <div style={{ fontSize: 10, color: C.dim }}>{ticket.hora}</div>
        </div>
      </div>

      {/* Items */}
      <div style={{ padding: '5px 0', flex: 1 }}>
        {ticket.items.map((item, i) => {
          const allergyItem = hasAllergyAlert(item.obs);
          return (
            <div key={item.id} style={{
              padding: '8px 13px',
              borderBottom: i < ticket.items.length - 1 ? `1px solid ${C.border}` : 'none',
              background: allergyItem ? 'rgba(239,68,68,0.04)' : 'transparent',
            }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                <div style={{
                  fontFamily: "'JetBrains Mono',monospace",
                  fontSize: 17,
                  fontWeight: 700,
                  color: isDone ? C.dim : C.white,
                  minWidth: 26,
                  flexShrink: 0,
                  lineHeight: 1.1,
                  marginTop: 1,
                }}>×{item.cant}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                    fontSize: 14,
                    fontWeight: 700,
                    color: isDone ? C.mid : C.ink,
                    textDecoration: isDone ? 'line-through' : 'none',
                    lineHeight: 1.25,
                  }}>{item.nombre}</div>
                  {item.extras.length > 0 && (
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 5 }}>
                      {item.extras.map(e => (
                        <span key={e} style={{
                          fontSize: 11,
                          fontWeight: 600,
                          color: '#AAA',
                          background: 'rgba(255,255,255,0.06)',
                          border: `1px solid ${C.borderStrong}`,
                          borderRadius: 4,
                          padding: '2px 6px',
                        }}>+ {e}</span>
                      ))}
                    </div>
                  )}
                  {item.obs && (
                    <div style={{
                      marginTop: allergyItem ? 6 : 5,
                      fontSize: allergyItem ? 13 : 12,
                      fontWeight: allergyItem ? 700 : 500,
                      color: allergyItem ? '#FCA5A5' : '#BBB',
                      fontStyle: 'italic',
                      lineHeight: 1.45,
                      display: 'flex',
                      alignItems: 'flex-start',
                      gap: 6,
                      background: allergyItem ? 'rgba(239,68,68,0.12)' : 'rgba(255,255,255,0.02)',
                      borderLeft: allergyItem ? '2px solid rgba(239,68,68,0.5)' : `2px solid ${C.border}`,
                      borderRadius: '0 5px 5px 0',
                      padding: '5px 8px',
                    }}>
                      <span style={{ fontSize: 11, color: allergyItem ? '#EF4444' : C.dim, flexShrink: 0, marginTop: 1 }}>{allergyItem ? '⚠' : '○'}</span>
                      {item.obs}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Acción */}
      {!isEntregado && (
        <div style={{ padding: '9px 12px', borderTop: `1px solid ${C.border}` }}>
          {ticket.status === 'listo' ? (
            <button onClick={() => onDismiss(ticket)} style={{
              width: '100%', height: 36,
              background: 'transparent',
              border: `1px solid ${C.border}`,
              borderRadius: 8,
              color: C.dim,
              fontFamily: "'Plus Jakarta Sans',sans-serif",
              fontSize: 12, fontWeight: 700,
              cursor: 'pointer', letterSpacing: '0.05em',
            }}>ENTREGADO ✓</button>
          ) : (
            <button onClick={() => onAdvance(ticket)} style={{
              width: '100%', height: 38,
              background: nextStatus === 'listo'
                ? C.white
                : urgency >= 2 ? `${urgColor}22` : 'rgba(255,255,255,0.07)',
              border: `1.5px solid ${nextStatus === 'listo' ? C.white : urgency >= 2 ? urgColor : C.borderStrong}`,
              borderRadius: 8,
              color: nextStatus === 'listo' ? '#0A0A0A' : urgency >= 2 ? urgColor : C.white,
              fontFamily: "'Plus Jakarta Sans',sans-serif",
              fontSize: 13, fontWeight: 800,
              cursor: 'pointer', letterSpacing: '0.05em', textTransform: 'uppercase',
              transition: 'all 150ms',
            }}>
              {nextStatus === 'preparando' ? '→ PREPARANDO' : '✓ LISTO'}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

/* ── STATS PANEL ─── */
function StatsPanel({ tickets }) {
  const [stats, setStats] = useState(getStats());
  // Refresca stats cada 30s para reflejar pedidos entregados recientes
  useEffect(() => {
    const t = setInterval(() => setStats(getStats()), 30000);
    return () => clearInterval(t);
  }, []);

  const enProceso = tickets.filter(t => t.status !== 'listo').length;
  const preparandoCount = tickets.filter(t => t.status === 'preparando').length;
  const listoCount = tickets.filter(t => t.status === 'listo').length;
  const bottleneck = preparandoCount > 4 ? 'preparando' : listoCount > 3 ? 'listos sin entregar' : null;

  // Distribución de tiempos: rápido <10m, normal 10-20m, lento >20m
  const s = loadStats();
  const dist = { rapido: 0, normal: 0, lento: 0 };
  (s.times || []).forEach(m => { if (m < 10) dist.rapido++; else if (m <= 20) dist.normal++; else dist.lento++; });
  const distTotal = dist.rapido + dist.normal + dist.lento || 1;

  // Gráfico de barras horario (últimas 10 horas)
  const nowH = new Date().getHours();
  const hours = Array.from({ length: 10 }, (_, i) => (nowH - 9 + i + 24) % 24);
  const maxHourly = Math.max(...hours.map(h => s.hourly[h] || 0), 1);

  const statBox = (label, val, sub, color) => (
    <div style={{ background: '#111', border: `1px solid ${C.border}`, borderRadius: 10, padding: '11px 15px', flexShrink: 0 }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: C.dim, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 5 }}>{label}</div>
      <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 22, fontWeight: 600, color: color || C.white, lineHeight: 1 }}>{val}</div>
      {sub && <div style={{ fontSize: 11, color: C.dim, marginTop: 4 }}>{sub}</div>}
    </div>
  );

  return (
    <div style={{ margin: '0 20px 16px', display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'stretch' }}>
      {statBox('Tiempo promedio', stats.avg ? `${stats.avg}m` : '—', 'por pedido hoy', !stats.avg ? C.dim : stats.avg >= 25 ? '#EF4444' : stats.avg >= 15 ? '#F59E0B' : '#22C55E')}
      {statBox('Entregados hoy', stats.total || 0, 'pedidos completados', C.white)}
      {statBox('En proceso', enProceso, 'nuevo + preparando', enProceso >= 8 ? '#EF4444' : enProceso >= 5 ? '#F97316' : C.white)}

      {/* Distribución de tiempos */}
      {s.times.length > 0 && (
        <div style={{ background: '#111', border: `1px solid ${C.border}`, borderRadius: 10, padding: '11px 15px', flexShrink: 0, minWidth: 160 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: C.dim, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Distribución tiempos</div>
          {[['Rápido', '< 10m', dist.rapido, '#22C55E'], ['Normal', '10–20m', dist.normal, '#F59E0B'], ['Lento', '> 20m', dist.lento, '#EF4444']].map(([lbl, rng, n, col]) => (
            <div key={lbl} style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 5 }}>
              <div style={{ fontSize: 10, color: C.dim, width: 42, flexShrink: 0 }}>{lbl}</div>
              <div style={{ flex: 1, height: 6, background: 'rgba(255,255,255,0.05)', borderRadius: 3, overflow: 'hidden' }}>
                <div style={{ height: '100%', width: `${(n / distTotal) * 100}%`, background: col, borderRadius: 3, transition: 'width 600ms ease' }} />
              </div>
              <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 11, color: col, width: 16, textAlign: 'right', flexShrink: 0 }}>{n}</div>
            </div>
          ))}
          <div style={{ fontSize: 10, color: C.dim, marginTop: 2 }}>{s.times.length} pedidos registrados</div>
        </div>
      )}

      {/* Gráfico hora pico */}
      <div style={{ background: '#111', border: `1px solid ${C.border}`, borderRadius: 10, padding: '11px 15px', flex: 1, minWidth: 200 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: C.dim, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>
          Pedidos por hora
          {stats.peak && <span style={{ marginLeft: 8, color: '#F59E0B', fontWeight: 600 }}>pico: {stats.peak.h}:00 ({stats.peak.n})</span>}
        </div>
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 3, height: 36 }}>
          {hours.map(h => {
            const n = s.hourly[h] || 0;
            const pct = n / maxHourly;
            const isCurrent = h === nowH;
            const isPeak = stats.peak && h === stats.peak.h;
            return (
              <div key={h} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
                <div style={{
                  width: '100%',
                  height: `${Math.max(pct * 32, n > 0 ? 4 : 0)}px`,
                  background: isPeak ? '#F59E0B' : isCurrent ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)',
                  borderRadius: '2px 2px 0 0',
                  transition: 'height 400ms ease',
                  position: 'relative',
                }}>
                  {n > 0 && <div style={{ position: 'absolute', top: -14, left: '50%', transform: 'translateX(-50%)', fontSize: 9, color: isPeak ? '#F59E0B' : C.dim, fontFamily: "'JetBrains Mono',monospace", whiteSpace: 'nowrap' }}>{n}</div>}
                </div>
                <div style={{ fontSize: 8, color: isCurrent ? C.mid : C.dim, fontFamily: "'JetBrains Mono',monospace", marginTop: 1 }}>{h}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Cuello de botella */}
      {bottleneck && (
        <div style={{ background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 10, padding: '11px 15px', display: 'flex', alignItems: 'center', gap: 10, animation: 'ring 2s ease infinite', flexShrink: 0 }}>
          <div style={{ fontSize: 22 }}>⚠</div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 800, color: '#EF4444', letterSpacing: '0.06em' }}>CUELLO DE BOTELLA</div>
            <div style={{ fontSize: 12, color: '#FCA5A5', marginTop: 3 }}>Acumulado en {bottleneck}</div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── APP ─── */
function App() {
  const [tickets, setTickets] = useState(db ? [] : DEMO_TICKETS);
  const [delivered, setDelivered] = useState([]);
  const [loading, setLoading] = useState(!!db);
  const [newAlert, setNewAlert] = useState(null);
  const [dbError, setDbError] = useState(null);
  const [soundOn, setSoundOn] = useState(true);
  const [showStats, setShowStats] = useState(false);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const [diag, setDiag] = useState(null);
  const [restaurant, setRestaurant] = useState(null);
  const soundRef = useRef(soundOn);
  soundRef.current = soundOn;

  const toggleFullscreen = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().then(() => setIsFullscreen(true)).catch(() => {});
    } else {
      document.exitFullscreen().then(() => setIsFullscreen(false)).catch(() => {});
    }
  };

  useEffect(() => {
    const onFs = () => setIsFullscreen(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange', onFs);
    return () => document.removeEventListener('fullscreenchange', onFs);
  }, []);

  useEffect(() => {
    if (!db) {
      const t = setTimeout(() => {
        const incoming = {
          id: 'T-2845', _supabaseId: null, mesa: 9, tipo: 'llevar',
          hora: new Date().toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit' }),
          elapsed: 0, status: 'nuevo',
          items: [
            { id: 20, nombre: 'Clásica Comanda', cant: 2, extras: ['Panceta'], obs: '' },
            { id: 21, nombre: 'Lomito simple', cant: 1, extras: ['Huevo frito', 'Queso'], obs: 'Bien tostado el pan' }
          ]
        };
        setTickets(prev => [incoming, ...prev]);
        setNewAlert(incoming.id);
        if (soundRef.current) playBeep('new');
        setTimeout(() => setNewAlert(null), 5000);
      }, 8000);
      return () => clearTimeout(t);
    }

    db.from('restaurants').select('id,name,logo_initials').eq('id', RESTAURANT_ID).maybeSingle()
      .then(({ data }) => { if (data) { setRestaurant(data); document.title = `Cocina — ${data.name}`; } });

    const runDiag = async () => {
      const cfg = window.SUPABASE_CONFIG || {};
      const info = { url: (cfg.url || '').slice(0, 40) || '(vacío)', restaurantId: RESTAURANT_ID };
      const { data: allOrders, error: e1 } = await db.from('orders').select('id,status').eq('restaurant_id', RESTAURANT_ID);
      if (e1) { info.error = e1.message; }
      else { info.allOrders = (allOrders || []).length; info.statusBreakdown = (allOrders || []).reduce((acc, o) => { acc[o.status] = (acc[o.status] || 0) + 1; return acc; }, {}); }
      setDiag(info);
    };
    runDiag();

    dbLoadTickets().then(({ tickets: data, error }) => {
      if (error) setDbError(error);
      else { setDbError(null); if (data) setTickets(data); }
      setLoading(false);
    });

    // Cargar últimas entregas (delivered en las últimas 2 horas)
    if (db) {
      const since = new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString();
      db.from('orders')
        .select('id,order_number,order_type,status,created_at,table_id,completed_at')
        .eq('restaurant_id', RESTAURANT_ID)
        .eq('status', 'delivered')
        .gte('completed_at', since)
        .order('completed_at', { ascending: false })
        .limit(10)
        .then(({ data: dOrds }) => {
          if (!dOrds || dOrds.length === 0) return;
          const tableIds = [...new Set(dOrds.map(o => o.table_id).filter(Boolean))];
          const tableMap = {};
          const fetchTables = tableIds.length > 0
            ? db.from('tables').select('id,number').in('id', tableIds).then(({ data: t }) => { (t||[]).forEach(x => { tableMap[x.id] = x.number; }); })
            : Promise.resolve();
          fetchTables.then(() => {
            const dTickets = dOrds.map(o => ({
              id: o.order_number,
              _supabaseId: o.id,
              mesa: o.table_id ? (tableMap[o.table_id] || '?') : '?',
              tipo: o.order_type === 'llevar' ? 'llevar' : 'local',
              hora: new Date(o.completed_at || o.created_at).toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit' }),
              elapsed: Math.floor((Date.now() - new Date(o.created_at).getTime()) / 60000),
              status: 'entregado',
              items: [],
            }));
            setDelivered(dTickets);
          });
        });
    }

    const fetchAndAddTicket = async (orderId) => {
      try {
        const { data: ord } = await db.from('orders')
          .select('id,order_number,order_type,status,created_at,table_id')
          .eq('id', orderId).eq('restaurant_id', RESTAURANT_ID).maybeSingle();
        if (!ord || !['paid', 'kitchen_received', 'cooking', 'ready'].includes(ord.status)) return;
        const tableMap = {};
        if (ord.table_id) {
          const { data: tbl } = await db.from('tables').select('id,number').eq('id', ord.table_id).maybeSingle();
          if (tbl) tableMap[tbl.id] = tbl.number;
        }
        const { data: items } = await db.from('order_items')
          .select('id,order_id,item_name,quantity,observations').eq('order_id', ord.id);
        const extrasMap = {};
        if ((items || []).length > 0) {
          const { data: extras } = await db.from('order_item_extras')
            .select('order_item_id,extra_name').in('order_item_id', items.map(i => i.id));
          (extras || []).forEach(e => {
            if (!extrasMap[e.order_item_id]) extrasMap[e.order_item_id] = [];
            extrasMap[e.order_item_id].push({ extra_name: e.extra_name });
          });
        }
        const fullOrder = {
          ...ord,
          tables: ord.table_id ? { number: tableMap[ord.table_id] || null } : null,
          order_items: (items || []).map(i => ({ ...i, order_item_extras: extrasMap[i.id] || [] }))
        };
        const ticket = orderToTicket(fullOrder);
        setTickets(prev => {
          if (prev.some(t => t.id === ticket.id)) return prev;
          return [ticket, ...prev];
        });
        setNewAlert(ticket.id);
        if (soundRef.current) playBeep('new');
        setTimeout(() => setNewAlert(null), 5000);
      } catch(e) { console.error('fetchAndAddTicket error:', e); }
    };

    const seenOrders = new Set();
    const channel = db.channel('cocina-realtime')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders', filter: `restaurant_id=eq.${RESTAURANT_ID}` }, (payload) => {
        const ord = payload.new;
        if (!['paid', 'kitchen_received', 'cooking', 'ready'].includes(ord.status)) return;
        if (seenOrders.has(ord.id)) return;
        seenOrders.add(ord.id);
        setTimeout(() => fetchAndAddTicket(ord.id), 800);
      })
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'order_status_history' }, (payload) => {
        const hist = payload.new;
        if (hist.status !== 'paid') return;
        if (seenOrders.has(hist.order_id)) return;
        seenOrders.add(hist.order_id);
        fetchAndAddTicket(hist.order_id);
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders' }, (payload) => {
        const upd = payload.new;
        if (upd.restaurant_id !== RESTAURANT_ID) return;
        if (upd.status === 'delivered' || upd.status === 'cancelled') {
          setTickets(prev => prev.filter(t => t._supabaseId !== upd.id));
        } else if (['paid', 'kitchen_received', 'cooking', 'ready'].includes(upd.status)) {
          setTickets(prev => prev.map(t => t._supabaseId === upd.id ? { ...t, status: toKitchenStatus(upd.status) } : t));
        }
      })
      .subscribe();

    const refreshInterval = setInterval(() => {
      dbLoadTickets().then(({ tickets: data, error }) => {
        if (error) { setDbError(error); return; }
        setDbError(null);
        if (data) setTickets(prev => {
          const sig = t => t.id + t.status;
          const unchanged = prev.length === data.length && prev.every((t, i) => sig(t) === sig(data[i]));
          return unchanged ? prev : data;
        });
      });
    }, 3000);

    return () => {
      db.removeChannel(channel);
      clearInterval(refreshInterval);
    };
  }, []);

  const advance = async (ticket) => {
    const nextStatus = nextKitchenStatus(ticket.status);
    setTickets(prev => prev.map(t => t.id === ticket.id ? { ...t, status: nextStatus } : t));
    await dbAdvanceTicket(ticket._supabaseId, ticket.status);
  };

  const dismiss = async (ticket) => {
    recordDone(ticket.elapsed);
    setDelivered(prev => [{ ...ticket, status: 'entregado' }, ...prev].slice(0, 8));
    setTickets(prev => prev.filter(t => t.id !== ticket.id));
    await dbDismissTicket(ticket._supabaseId);
  };

  const nuevos     = sortByUrgency(tickets.filter(t => t.status === 'nuevo'));
  const preparando = sortByUrgency(tickets.filter(t => t.status === 'preparando'));
  const listos     = tickets.filter(t => t.status === 'listo');
  const urgentes   = tickets.filter(t => urgencyLevel(t.elapsed, t.status) >= 2 && t.status !== 'listo').length;
  const total      = tickets.filter(t => t.status !== 'listo').length;

  return (
    <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', flexDirection: 'column' }}>

      {/* Topbar */}
      <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: '0 20px', height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0, position: 'sticky', top: 0, zIndex: 100, gap: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 18, color: C.white }}>{restaurant?.name || 'Cocina'}</div>
          <div style={{ width: 1, height: 16, background: C.border }} />
          <div style={{ fontSize: 11, fontWeight: 700, color: C.dim, letterSpacing: '0.12em', textTransform: 'uppercase' }}>Cocina</div>
          {!db && <div style={{ fontSize: 10, fontWeight: 600, color: '#555', background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)', borderRadius: 5, padding: '2px 7px' }}>DEMO</div>}
          {db && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: dbError ? '#EF4444' : '#22C55E', flexShrink: 0 }} />
              <span style={{ fontSize: 10, color: dbError ? '#EF4444' : '#555', fontWeight: 600 }}>{dbError ? 'Sin conexión' : 'DB OK'}</span>
            </div>
          )}
          {urgentes > 0 && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.4)', borderRadius: 20, padding: '3px 10px', animation: 'ring 2s ease infinite' }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#EF4444', animation: 'pulse 1s ease infinite' }} />
              <span style={{ fontSize: 10, fontWeight: 800, color: '#EF4444', letterSpacing: '0.06em' }}>{urgentes} URGENTE{urgentes > 1 ? 'S' : ''}</span>
            </div>
          )}
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {loading && <div style={{ width: 14, height: 14, border: '2px solid #333', borderTopColor: '#888', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />}
          <div style={{ fontSize: 11, color: C.mid }}>
            <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 14, fontWeight: 700, color: C.white }}>{total}</span> activos
          </div>
          <Clock />
          <div style={{ display: 'flex', gap: 5, marginLeft: 4 }}>
            <Btn active={showStats} onClick={() => setShowStats(v => !v)} title="Estadísticas">STATS</Btn>
            <Btn onClick={() => { const on = !soundOn; setSoundOn(on); if (on) playBeep('new'); }} title={soundOn ? 'Silenciar' : 'Activar sonido'}>
              {soundOn ? '🔔' : '🔕'}
            </Btn>
            <Btn onClick={toggleFullscreen} title={isFullscreen ? 'Salir de pantalla completa' : 'Pantalla completa'}>
              {isFullscreen ? '⊡' : '⛶'}
            </Btn>
          </div>
          {window._userProfile && <span style={{ fontSize: 10, color: '#555', fontWeight: 600 }}>{window._userProfile.display_name || window._userProfile.username}</span>}
          {db && <button onClick={async () => { await db.auth.signOut(); window.location.replace('login.html'); }} style={{ background: 'transparent', border: '1px solid #222', borderRadius: 6, color: '#555', fontSize: 10, padding: '4px 9px', cursor: 'pointer', fontFamily: 'inherit' }}>Salir</button>}
        </div>
      </div>

      {/* Error banner */}
      {dbError && (
        <div style={{ margin: '10px 20px 0', background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 10, padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: '#EF4444' }}>Error DB:</span>
          <span style={{ fontSize: 11, color: '#F87171', flex: 1 }}>{dbError}</span>
          <span style={{ fontSize: 10, color: '#888' }}>Verificá SUPABASE_URL y SUPABASE_ANON_KEY en Vercel</span>
        </div>
      )}

      {/* Alerta nuevo pedido */}
      {newAlert && (() => {
        const t = tickets.find(t => t.id === newAlert);
        return (
          <div style={{ margin: '10px 20px 0', background: 'rgba(255,255,255,0.05)', border: `1px solid ${C.borderStrong}`, borderRadius: 10, padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10, animation: 'slideIn 300ms ease' }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.white, animation: 'pulse 0.8s ease infinite', flexShrink: 0 }} />
            <span style={{ fontSize: 13, fontWeight: 700, color: C.white }}>Nuevo pedido</span>
            {t && <span style={{ fontSize: 12, color: C.mid }}>— Mesa {t.mesa} · {t.tipo === 'llevar' ? 'Para llevar · ' : ''}{t.items.length} items</span>}
          </div>
        );
      })()}

      {/* Stats */}
      {showStats && <div style={{ paddingTop: 14 }}><StatsPanel tickets={tickets} /></div>}

      {/* Board 4 columnas */}
      <div style={{ flex: 1, padding: '14px 20px 20px', display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 14, alignItems: 'start', overflowY: 'auto' }}>
        <Column title="Nuevo"      tickets={nuevos}     count={nuevos.length}     onAdvance={advance} onDismiss={dismiss} accent={COL_COLOR.nuevo}      emptyMsg="Sin pedidos nuevos" />
        <Column title="Preparando" tickets={preparando}  count={preparando.length} onAdvance={advance} onDismiss={dismiss} accent={COL_COLOR.preparando}  emptyMsg="Cocina libre" />
        <Column title="Listo"      tickets={listos}      count={listos.length}     onAdvance={advance} onDismiss={dismiss} accent={COL_COLOR.listo}       emptyMsg="Nada listo aún" />
        <Column title="Entregado"  tickets={delivered}   count={delivered.length}  onAdvance={advance} onDismiss={dismiss} accent={COL_COLOR.entregado}   emptyMsg="Entregas de hoy" />
      </div>

      {/* Diagnóstico */}
      {db && diag && (
        <div style={{ margin: '0 20px 20px', background: '#0D1117', border: '1px solid #1A1A1A', borderRadius: 10, padding: '10px 14px', fontFamily: "'JetBrains Mono',monospace", fontSize: 11 }}>
          <div style={{ color: '#333', marginBottom: 5, fontFamily: "'Plus Jakarta Sans',sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Diagnóstico</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', gap: '3px 14px' }}>
            <span style={{ color: '#333' }}>URL:</span><span style={{ color: '#555' }}>{diag.url}…</span>
            <span style={{ color: '#333' }}>Restaurant:</span><span style={{ color: '#555' }}>{diag.restaurantId}</span>
            {diag.error
              ? <><span style={{ color: '#EF4444' }}>ERROR:</span><span style={{ color: '#F87171' }}>{diag.error}</span></>
              : <>
                <span style={{ color: '#333' }}>Pedidos DB:</span>
                <span style={{ color: diag.allOrders > 0 ? '#22C55E' : '#F59E0B' }}>{diag.allOrders ?? '…'}{diag.allOrders === 0 ? ' — ningún pedido aún' : ''}</span>
                {diag.statusBreakdown && Object.keys(diag.statusBreakdown).length > 0 && (
                  <><span style={{ color: '#333' }}>Por estado:</span>
                  <span style={{ color: '#555' }}>{Object.entries(diag.statusBreakdown).map(([s, n]) => `${s}: ${n}`).join(' · ')}</span></>
                )}
              </>
            }
          </div>
        </div>
      )}
    </div>
  );
}

/* ── UTILS ─── */
function Btn({ children, onClick, title, active }) {
  return (
    <button onClick={onClick} title={title} style={{
      background: active ? 'rgba(255,255,255,0.1)' : 'transparent',
      border: `1px solid ${active ? C.borderStrong : C.border}`,
      borderRadius: 7,
      color: active ? C.white : C.dim,
      padding: '5px 9px',
      fontSize: 12,
      fontWeight: 700,
      cursor: 'pointer',
      fontFamily: 'inherit',
      letterSpacing: '0.04em',
      transition: 'all 120ms',
    }}>{children}</button>
  );
}

function Clock() {
  const [time, setTime] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
  return (
    <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 14, fontWeight: 500, color: C.mid, letterSpacing: '0.04em' }}>
      {time.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
    </div>
  );
}

/* ── AUTH GUARD ─── */
async function bootstrap() {
  if (!db) { window.location.replace('login.html'); return; }
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.replace('login.html'); return; }
  const { data: profile } = await db.rpc('get_my_profile');
  if (!profile || !['cocina', 'admin', 'superadmin'].includes(profile.role)) {
    await db.auth.signOut();
    window.location.replace('login.html');
    return;
  }
  window._userProfile = profile;
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
bootstrap();
</script>
